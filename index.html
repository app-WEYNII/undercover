      </div>
      <button onClick={() => transition(() => setScreen("names"))} disabled={mode === "perso" && customUC + customMW >= playerCount} style={{ ...btnPrimaryConst, marginTop: 16, marginBottom: 40, opacity: (mode === "perso" && customUC + customMW >= playerCount) ? 0.4 : 1 }}>Suivant →</button>
    </div>
  );

  // ═══════════ NAMES ═══════════
  if (screen === "names") return (
    <div style={cs}><style>{cssVars}</style>
      {cameraOpenFor !== null && (
        <CameraModal
          onCapture={(url) => { updatePhoto(cameraOpenFor, url); setCameraOpenFor(null); }}
          onClose={() => setCameraOpenFor(null)}
        />
      )}
      <button onClick={() => transition(() => setScreen("setup"))} style={btnBack}>← Retour</button>
      <div style={{ textAlign: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 40, marginBottom: 4 }}>👥</div>
        <h2 style={sectionTitle}>Qui joue ?</h2>
        <p style={{ color: "var(--text2)", fontSize: 13, maxWidth: 340, margin: "0 auto" }}>
          Choisis ton emoji ou prends-toi en photo !
        </p>
      </div>
      <div style={{ width: "100%", maxWidth: 400, display: "flex", flexDirection: "column", gap: 10, marginTop: 16 }}>
        {(() => {
          const finalNames = playerNames.map((n, i) => (n.trim() || `Joueur ${i + 1}`));
          const dupes = new Set();
          finalNames.forEach((n, i) => {
            if (finalNames.findIndex((x) => x.toLowerCase() === n.toLowerCase()) !== i) dupes.add(n.toLowerCase());
          });
          const hasDupes = dupes.size > 0;
          const canLaunch = !hasDupes && !(mode === "perso" && customUC + customMW >= playerCount);

          return (
            <>
              {Array.from({ length: playerCount }, (_, i) => {
                const fn = finalNames[i];
                const isDupe = dupes.has(fn.toLowerCase());
                return (
                  <div key={i} style={{
                    display: "flex", alignItems: "center", gap: 10,
                    background: "var(--surface)", borderRadius: 14,
                    padding: "6px 6px 6px 10px",
                    border: isDupe ? "1px solid #E63946" : "1px solid var(--border)",
                    transition: "border-color .2s",
                  }}>
                    <EmojiPicker
                      value={playerEmojis[i]}
                      photo={playerPhotos[i]}
                      onSelect={(e) => updateEmoji(i, e)}
                      onPhoto={() => setCameraOpenFor(i)}
                    />
                    <input
                      value={playerNames[i] || ""}
                      onChange={(e) => updateName(i, e.target.value)}
                      placeholder={`Joueur ${i + 1}`}
                      maxLength={20}
                      style={{ flex: 1, padding: "13px 12px", borderRadius: 10, border: "none", background: "var(--surface2)", color: "var(--text)", fontSize: 15, fontFamily: "var(--font)", outline: "none" }}
                    />
                    {isDupe ? (
                      <span style={{ color: "#E63946", fontSize: 12, marginRight: 8, fontWeight: 700 }}>⚠️</span>
                    ) : playerNames[i]?.trim() ? (
                      <span style={{ color: "var(--accent)", fontSize: 14, marginRight: 8, fontWeight: 700 }}>✓</span>
                    ) : null}
                  </div>
                );
              })}

              {hasDupes && (
                <p style={{ fontSize: 12, color: "#E63946", fontWeight: 600, textAlign: "center", marginTop: 4 }}>
                  ⚠️ Deux joueurs ne peuvent pas avoir le même prénom
                </p>
              )}

              <p style={{ fontSize: 11, color: "var(--text3)", marginTop: hasDupes ? 2 : 10, textAlign: "center" }}>Les champs vides → « Joueur X »</p>

              <button onClick={startGame} disabled={!canLaunch} style={{
                ...btnPrimaryConst, marginTop: 12, marginBottom: 40,
                opacity: canLaunch ? 1 : 0.4, cursor: canLaunch ? "pointer" : "not-allowed",
              }}>🚀 Lancer la partie</button>
            </>
          );
        })()}
      </div>
    </div>
  );

  // ═══════════ REVEAL ═══════════
  if (screen === "reveal") {
    // ─── MULTI version ───
    if (playMode === "multi") {
      // mySlotIdx, myWord, myRole are set
      const meIdx = mySlotIdx;
      const me = players[meIdx];
      const role = myRole;
      const word = myWord;
      const rc = role === "civil" ? "var(--accent)" : role === "undercover" ? "#E63946" : "#aaa";
      const rl = role === "civil" ? "Civil" : role === "undercover" ? "Undercover" : "Mr. White";
      // Until we have our role and a player record, show a brief loading
      if (!me || !role) {
        return (
          <div style={{ ...cs, justifyContent: "center" }}><style>{cssVars}</style>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 48, marginBottom: 12, animation: "pulse 1.5s infinite" }}>🎴</div>
              <p style={{ color: "var(--text2)", fontSize: 14 }}>Distribution des rôles…</p>
            </div>
          </div>
        );
      }
      return (
        <div style={{ ...cs, justifyContent: "center", minHeight: "100vh" }}><style>{cssVars}</style>
          <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 24, fontWeight: 600 }}>Ton rôle</p>
          <div style={{ background: "var(--surface)", borderRadius: 24, padding: "40px 32px", border: "1px solid var(--border)", textAlign: "center", width: "100%", maxWidth: 340, boxShadow: "0 20px 60px rgba(0,0,0,.3)" }}>
            <Avatar emoji={me.emoji} photo={me.photo} size={72} style={{ margin: "0 auto 12px", border: "3px solid var(--border)" }} />
            <h2 style={{ fontSize: 22, fontWeight: 800, fontFamily: "var(--font-display)" }}>{me.name}</h2>
            {wordVisible ? (
              <div style={{ marginTop: 20, animation: "fadeUp .4s ease" }}>
                <span style={{ display: "inline-block", padding: "4px 14px", borderRadius: 20, background: rc + "22", color: rc, fontSize: 12, fontWeight: 700, marginBottom: 12 }}>{rl}</span>
                <p style={{ fontSize: 28, fontWeight: 900, fontFamily: "var(--font-display)", color: rc, marginTop: 8 }}>
                  {role === "mrwhite" ? "Aucun mot 👀" : word}
                </p>
                <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 16 }}>Mémorise bien ton mot.</p>
              </div>
            ) : (
              <div style={{ marginTop: 20 }}>
                <p style={{ color: "var(--text2)", fontSize: 14 }}>Appuie pour voir ton rôle</p>
                <div style={{ width: 64, height: 64, margin: "16px auto", borderRadius: "50%", background: "var(--accent)11", border: "2px dashed var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, animation: "pulse 2s infinite" }}>👁️</div>
              </div>
            )}
          </div>
          {!wordVisible ? (
            <button onClick={() => setWordVisible(true)} style={{ ...btnPrimaryConst, marginTop: 32, width: "100%", maxWidth: 340 }}>
              👁️ Révéler mon rôle
            </button>
          ) : (
            isHost ? (
              <button onClick={() => { startDescribePhase(players); transition(() => setScreen("game")); }} style={{ ...btnPrimaryConst, marginTop: 32, width: "100%", maxWidth: 340 }}>
                🎮 Lancer la phase de description
              </button>
            ) : (
              <div style={{ marginTop: 32, textAlign: "center", color: "var(--text3)", fontSize: 13 }}>
                <div style={{ fontSize: 28, marginBottom: 8, animation: "pulse 1.5s infinite" }}>⏳</div>
                En attente de l'hôte…
              </div>
            )
          )}
        </div>
      );
    }
    // ─── SOLO version (original) ───
    const p = players[revealIndex];
    const rc = p.role === "civil" ? "var(--accent)" : p.role === "undercover" ? "#E63946" : "#aaa";
    const rl = p.role === "civil" ? "Civil" : p.role === "undercover" ? "Undercover" : "Mr. White";
    return (
      <div style={{ ...cs, justifyContent: "center", minHeight: "100vh" }}><style>{cssVars}</style>
        <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 24, fontWeight: 600 }}>{revealIndex + 1} / {players.length}</p>
        <div style={{ background: "var(--surface)", borderRadius: 24, padding: "40px 32px", border: "1px solid var(--border)", textAlign: "center", width: "100%", maxWidth: 340, boxShadow: "0 20px 60px rgba(0,0,0,.3)" }}>
          <Avatar emoji={p.emoji} photo={p.photo} size={72} style={{ margin: "0 auto 12px", border: "3px solid var(--border)" }} />
          <h2 style={{ fontSize: 22, fontWeight: 800, fontFamily: "var(--font-display)" }}>{p.name}</h2>
          {wordVisible ? (
            <div style={{ marginTop: 20, animation: "fadeUp .4s ease" }}>
              <span style={{ display: "inline-block", padding: "4px 14px", borderRadius: 20, background: rc + "22", color: rc, fontSize: 12, fontWeight: 700, marginBottom: 12 }}>{rl}</span>
              <p style={{ fontSize: 28, fontWeight: 900, fontFamily: "var(--font-display)", color: rc, marginTop: 8 }}>
                {p.role === "mrwhite" ? "Aucun mot 👀" : p.word}
              </p>
              <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 16 }}>Mémorise ton mot puis passe au suivant</p>
            </div>
          ) : (
            <div style={{ marginTop: 20 }}>
              <p style={{ color: "var(--text2)", fontSize: 14 }}>Appuie pour voir ton mot</p>
              <div style={{ width: 64, height: 64, margin: "16px auto", borderRadius: "50%", background: "var(--accent)11", border: "2px dashed var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, animation: "pulse 2s infinite" }}>👁️</div>
            </div>
          )}
        </div>
        <button onClick={nextReveal} style={{ ...btnPrimaryConst, marginTop: 32, width: "100%", maxWidth: 340 }}>
          {!wordVisible ? "👁️ Révéler mon mot" : revealIndex < players.length - 1 ? "Joueur suivant →" : "🎮 Commencer !"}
        </button>
      </div>
    );
  }

  // ═══════════ GAME ═══════════
  if (screen === "game") {
    const alive = getAlive();
    const me = mySlotIdx >= 0 ? players[mySlotIdx] : null;
    const amSpectator = playMode === "multi" && me && !me.alive;
    return (
      <div style={cs}><style>{cssVars}</style>
        <div style={{ width: "100%", maxWidth: 400 }}>
          {playMode === "multi" && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, fontSize: 11, color: "var(--text3)", gap: 8 }}>
              <span style={{ fontFamily: "var(--font-mono)" }}>{isHost ? "🎯" : "🔗"} {roomCode}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {amSpectator && <span style={{ background: "#88888822", color: "#888", padding: "3px 10px", borderRadius: 8, fontWeight: 700 }}>👻 SPECTATEUR</span>}
                {me && me.alive && <span style={{ background: "var(--accent)22", color: "var(--accent)", padding: "3px 10px", borderRadius: 8, fontWeight: 700 }}>{me.name}</span>}
                {isHost && (
                  <button onClick={() => {
                    if (window.confirm("Mettre fin à la partie en cours ? Tous les joueurs reviendront au lobby.")) endGameMulti();
                  }} style={{ background: "#E6394622", color: "#E63946", border: "1px solid #E6394644", borderRadius: 8, padding: "3px 10px", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>
                    🏁 Fin
                  </button>
                )}
              </div>
            </div>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800, fontFamily: "var(--font-display)" }}>
              {gamePhase === "describe" ? "💬 Description" : "🗳️ Vote"}
            </h2>
            <span style={{ fontSize: 12, color: "var(--text2)", fontFamily: "var(--font-mono)", background: "var(--surface2)", padding: "4px 10px", borderRadius: 8 }}>{alive.length} en jeu</span>
          </div>

          {lastElim && gamePhase === "describe" && (
            <div style={{ background: "#E6394611", border: "1px solid #E6394633", borderRadius: 14, padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "#E63946", display: "flex", alignItems: "center", gap: 10 }}>
              <Avatar emoji={lastElim.emoji} photo={lastElim.photo} size={28} />
              <span>❌ <strong>{lastElim.name}</strong> éliminé(e) — <strong>{lastElim.role === "civil" ? "Civil" : lastElim.role === "undercover" ? "Undercover" : "Mr. White"}</strong></span>
            </div>
          )}

          {/* ── DESCRIBE PHASE ── */}
          {gamePhase === "describe" && (
            <>
              {!allSpoken ? (
                <>
                  <div style={{ width: "100%", height: 4, background: "var(--surface2)", borderRadius: 2, marginBottom: 20, overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 2, background: "linear-gradient(90deg, var(--accent), var(--accent2))", width: `${(speakingIndex / speakingOrder.length) * 100}%`, transition: "width .4s ease" }} />
                  </div>
                  {speakingOrder.length > 0 && speakingIndex < speakingOrder.length && (() => {
                    const sp = players[speakingOrder[speakingIndex]];
                    const isMyTurn = playMode === "multi" && sp && sp.playerId === myPlayerId;
                    const amSpectator = playMode === "multi" && mySlotIdx >= 0 && players[mySlotIdx] && !players[mySlotIdx].alive;
                    return (
                      <div style={{ ...card, textAlign: "center", padding: "32px 24px", border: "1px solid var(--accent)44", boxShadow: "0 8px 32px rgba(108,92,231,.15)", animation: "fadeUp .4s ease" }}>
                        <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 8, fontFamily: "var(--font-mono)" }}>Tour {speakingIndex + 1} / {speakingOrder.length}</p>
                        <Avatar emoji={sp.emoji} photo={sp.photo} size={64} style={{ margin: "0 auto 12px", border: "3px solid var(--accent)" }} />
                        <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 4 }}>C'est au tour de</p>
                        <h3 style={{ fontSize: 26, fontWeight: 900, fontFamily: "var(--font-display)", color: "var(--accent)" }}>{sp.name}{isMyTurn && " (toi)"}</h3>
                        <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 12 }}>
                          {playMode === "multi"
                            ? (isMyTurn ? "À toi de parler ! Décris ton mot." : amSpectator ? "Tu es en mode spectateur." : "Écoute la description.")
                            : "Décris ton mot sans le dire !"}
                        </p>
                        {timerEnabled && <div style={{ marginTop: 16, display: "flex", justifyContent: "center" }}><Timer key={speakingIndex} seconds={timerSeconds} onEnd={() => {}} /></div>}
                      </div>
                    );
                  })()}
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 16, justifyContent: "center" }}>
                    {speakingOrder.map((pIdx, i) => (
                      <div key={pIdx} style={{ display: "flex", alignItems: "center", gap: 4, padding: "3px 10px 3px 3px", borderRadius: 20, background: i < speakingIndex ? "var(--accent)15" : i === speakingIndex ? "var(--accent)" : "var(--surface2)", transition: "all .3s", opacity: i < speakingIndex ? .5 : 1 }}>
                        <Avatar emoji={players[pIdx]?.emoji} photo={players[pIdx]?.photo} size={22} style={{ border: "none" }} />
                        <span style={{ fontSize: 11, fontWeight: 600, color: i === speakingIndex ? "#fff" : "var(--text3)", textDecoration: i < speakingIndex ? "line-through" : "none" }}>{players[pIdx]?.name}</span>
                      </div>
                    ))}
                  </div>
                  {(() => {
                    const sp = players[speakingOrder[speakingIndex]];
                    if (playMode === "multi") {
                      const isMyTurn = sp && sp.playerId === myPlayerId;
                      if (!isMyTurn) {
                        return (
                          <>
                            <div style={{ marginTop: 20, padding: "14px", background: "var(--surface2)", borderRadius: 12, textAlign: "center", color: "var(--text3)", fontSize: 13 }}>
                              ⏳ {sp?.name} doit cliquer sur son téléphone…
                              {sp && players[speakingOrder[speakingIndex]]?.connected === false && (
                                <div style={{ marginTop: 6, color: "#FF6B35", fontWeight: 700 }}>⚠️ {sp.name} est déconnecté</div>
                              )}
                            </div>
                            {isHost && (
                              <button onClick={hostForceAdvanceSpeaker} style={{ ...btnSecondaryConst, marginTop: 10, width: "100%", background: "#FFD16622", color: "#FFD166", border: "1px solid #FFD16644" }}>
                                ⏭️ Forcer le tour suivant <span style={{ fontSize: 11, opacity: .7 }}>(Hôte)</span>
                              </button>
                            )}
                          </>
                        );
                      }
                      // It's my turn — I send to host (or advance directly if host)
                      const advance = () => {
                        if (isHost) {
                          if (speakingIndex < speakingOrder.length - 1) setSpeakingIndex(speakingIndex + 1);
                          else setAllSpoken(true);
                        } else {
                          sendToHost({ type: "next_speaker", playerId: myPlayerId });
                        }
                      };
                      return (
                        <button onClick={advance} style={{ ...btnPrimaryConst, marginTop: 20, width: "100%" }}>
                          {speakingIndex < speakingOrder.length - 1 ? "✓ J'ai fini, joueur suivant →" : "✅ J'ai fini de parler"}
                        </button>
                      );
                    }
                    // Solo: original button
                    return (
                      <button onClick={() => { if (speakingIndex < speakingOrder.length - 1) setSpeakingIndex(speakingIndex + 1); else setAllSpoken(true); }} style={{ ...btnPrimaryConst, marginTop: 20, width: "100%" }}>
                        {speakingIndex < speakingOrder.length - 1 ? "Joueur suivant →" : "✅ Tout le monde a parlé"}
                      </button>
                    );
                  })()}
                </>
              ) : (
                <div style={{ ...card, textAlign: "center", padding: "28px 20px" }}>
                  <div style={{ fontSize: 40, marginBottom: 8 }}>💬</div>
                  <p style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>Tous les joueurs ont donné leur indice !</p>
                  <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 20 }}>Délibérez, puis passez au vote.</p>
                  {(playMode !== "multi" || isHost) ? (
                    <button onClick={startVote} style={{ ...btnPrimaryConst, width: "100%" }}>🗳️ Passer au vote</button>
                  ) : (
                    <p style={{ fontSize: 12, color: "var(--text3)" }}>⏳ En attente de l'hôte…</p>
                  )}
                </div>
              )}
            </>
          )}

          {/* ── VOTE PHASE — MULTI ── */}
          {gamePhase === "vote" && playMode === "multi" && (() => {
            const me = mySlotIdx >= 0 ? players[mySlotIdx] : null;
            const amAlive = !!(me && me.alive);
            const targets = alive.filter((t) => t.idx !== mySlotIdx);
            const totalAlive = alive.length;
            const votesDone = isHost ? Object.keys(votes).length : voteCounts.done;
            const votesTotal = isHost ? voteOrder.length : voteCounts.total;
            const showCountdown = voteCountdown > 0;
            return (
              <div>
                <div style={{ display: "flex", justifyContent: "center", gap: 4, marginBottom: 14 }}>
                  {Array.from({ length: votesTotal || totalAlive }).map((_, i) => (
                    <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < votesDone ? "var(--accent)" : "var(--surface2)", transition: "background .3s" }} />
                  ))}
                </div>
                <p style={{ textAlign: "center", fontSize: 12, color: "var(--text3)", marginBottom: 16, fontFamily: "var(--font-mono)" }}>
                  {votesDone} / {votesTotal || totalAlive} ont voté
                </p>
                {isHost && !showCountdown && votesDone < (votesTotal || totalAlive) && (
                  <button onClick={() => {
                    // If at least one vote, run resolveVote with what we have. Otherwise, abort.
                    if (Object.keys(votes).length === 0) {
                      if (window.confirm("Aucun vote enregistré. Veux-tu forcer une résolution aléatoire ?")) {
                        // Pick a random alive target
                        const targets = alive.map(p => p.idx);
                        if (targets.length > 0) {
                          const randomTarget = targets[Math.floor(Math.random() * targets.length)];
                          setVotes({ [targets[0]]: randomTarget });
                          setTimeout(() => resolveVote(), 100);
                        }
                      }
                    } else {
                      setVoteCountdown(3);
                    }
                  }} style={{ ...btnSecondaryConst, width: "100%", marginBottom: 12, background: "#FFD16622", color: "#FFD166", border: "1px solid #FFD16644", padding: "10px" }}>
                    ⏭️ Forcer la résolution avec les votes actuels <span style={{ fontSize: 11, opacity: .7 }}>(Hôte)</span>
                  </button>
                )}

                {showCountdown ? (
                  <div style={{ ...card, textAlign: "center", padding: "40px 24px", animation: "fadeUp .3s ease" }}>
                    <div style={{ fontSize: 12, color: "var(--text3)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 2 }}>Révélation dans</div>
                    <div style={{ fontSize: 80, fontWeight: 900, fontFamily: "var(--font-display)", color: "var(--accent)", animation: "pulse 1s infinite", lineHeight: 1 }}>{voteCountdown}</div>
                  </div>
                ) : !amAlive ? (
                  <div style={{ ...card, textAlign: "center", padding: "32px 24px" }}>
                    <div style={{ fontSize: 40, marginBottom: 8 }}>👻</div>
                    <h3 style={{ fontSize: 16, fontWeight: 800, color: "#888" }}>Mode spectateur</h3>
                    <p style={{ fontSize: 13, color: "var(--text3)", marginTop: 8 }}>Tu observes le vote. Patience…</p>
                  </div>
                ) : iVoted ? (
                  <div style={{ ...card, textAlign: "center", padding: "28px 24px", animation: "fadeUp .3s ease" }}>
                    <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
                    <h3 style={{ fontSize: 18, fontWeight: 800, color: "var(--accent)" }}>Vote enregistré !</h3>
                    <p style={{ fontSize: 13, color: "var(--text3)", marginTop: 8 }}>En attente des autres joueurs…</p>
                  </div>
                ) : (
                  <div style={{ ...card, padding: "20px 16px" }}>
                    <div style={{ textAlign: "center", marginBottom: 14 }}>
                      <div style={{ fontSize: 32, marginBottom: 4 }}>🗳️</div>
                      <p style={{ fontSize: 15, fontWeight: 700 }}>Qui veux-tu éliminer ?</p>
                      <p style={{ fontSize: 11, color: "var(--text3)", marginTop: 4 }}>Vote secret</p>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {targets.map((target) => (
                        <button key={target.idx} onClick={() => {
                          if (isHost) {
                            setVotes((p) => ({ ...p, [mySlotIdx]: target.idx }));
                          } else {
                            sendToHost({ type: "cast_vote", playerId: myPlayerId, targetIdx: target.idx });
                          }
                          setIVoted(true);
                        }} style={{
                          padding: "14px 16px", borderRadius: 14, cursor: "pointer", fontSize: 15, fontWeight: 600,
                          border: "2px solid var(--border)", display: "flex", alignItems: "center", gap: 10,
                          background: "var(--surface2)", color: "var(--text)", width: "100%",
                        }}>
                          <Avatar emoji={target.emoji} photo={target.photo} size={32} style={{ border: "none" }} />
                          {target.name}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* ── VOTE PHASE — SOLO QUICK ── */}
          {gamePhase === "vote" && playMode !== "multi" && quickVote && (
            <div style={{ ...card, padding: "20px 16px" }}>
              <div style={{ textAlign: "center", marginBottom: 16 }}>
                <div style={{ fontSize: 36, marginBottom: 6 }}>🗳️</div>
                <p style={{ fontSize: 15, fontWeight: 700 }}>Qui est éliminé ?</p>
                <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 4 }}>Votez à l'oral, puis tapez la personne éliminée</p>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {alive.map((p) => (
                  <button key={p.idx} onClick={() => quickEliminate(p.idx)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 14, background: "var(--surface2)", border: "2px solid transparent", cursor: "pointer", textAlign: "left", transition: "all .2s" }} onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#E63946"; e.currentTarget.style.background = "#E6394611"; }} onMouseLeave={(e) => { e.currentTarget.style.borderColor = "transparent"; e.currentTarget.style.background = "var(--surface2)"; }}>
                    <Avatar emoji={p.emoji} photo={p.photo} size={36} />
                    <span style={{ fontSize: 15, fontWeight: 700, color: "var(--text)", flex: 1 }}>{p.name}</span>
                    <span style={{ fontSize: 18 }}>❌</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {gamePhase === "vote" && playMode !== "multi" && !quickVote && (
            <>
              {voteIndex < voteOrder.length ? (() => {
                const voterIdx = voteOrder[voteIndex];
                const voter = players[voterIdx];
                const targets = alive.filter((t) => t.idx !== voterIdx);
                const isLast = voteIndex >= voteOrder.length - 1;
                const nextVoter = !isLast ? players[voteOrder[voteIndex + 1]] : null;

                // Choosing screen — pick a target
                if (voteStep === "choosing") return (
                  <div style={{ ...card, textAlign: "center", padding: "24px 20px", animation: "fadeUp .3s ease" }}>
                    <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 12, fontFamily: "var(--font-mono)" }}>
                      Vote {voteIndex + 1} / {voteOrder.length}
                    </p>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 16 }}>
                      <Avatar emoji={voter.emoji} photo={voter.photo} size={32} style={{ border: "none" }} />
                      <h3 style={{ fontSize: 18, fontWeight: 800, fontFamily: "var(--font-display)" }}>{voter.name}, qui éliminer ?</h3>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {targets.map((target) => (
                        <button key={target.idx} onClick={() => { castVote(voterIdx, target.idx); setVoteStep("confirmed"); }} style={{
                          padding: "14px 16px", borderRadius: 14, cursor: "pointer", fontSize: 15, fontWeight: 600,
                          transition: "all .2s", border: "2px solid var(--border)", display: "flex", alignItems: "center", gap: 10,
                          background: "var(--surface2)", color: "var(--text)", width: "100%",
                        }}>
                          <Avatar emoji={target.emoji} photo={target.photo} size={32} style={{ border: "none" }} />
                          {target.name}
                        </button>
                      ))}
                    </div>
                  </div>
                );

                // Confirmed screen — also acts as handoff to next voter
                if (voteStep === "confirmed") return (
                  <div style={{ ...card, textAlign: "center", padding: "28px 24px", animation: "fadeUp .3s ease" }}>
                    <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
                    <h3 style={{ fontSize: 18, fontWeight: 800, fontFamily: "var(--font-display)", color: "var(--accent)" }}>Vote enregistré !</h3>
                    {nextVoter ? (
                      <>
                        <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 16, marginBottom: 4 }}>Passe le téléphone à</p>
                        <Avatar emoji={nextVoter.emoji} photo={nextVoter.photo} size={56} style={{ margin: "8px auto", border: "3px solid var(--accent)" }} />
                        <h4 style={{ fontSize: 22, fontWeight: 900, fontFamily: "var(--font-display)", color: "var(--accent)" }}>{nextVoter.name}</h4>
                        <p style={{ fontSize: 11, color: "var(--text3)", marginTop: 8 }}>Les autres, ne regardez pas !</p>
                      </>
                    ) : (
                      <p style={{ fontSize: 13, color: "var(--text3)", marginTop: 8 }}>Tous les votes sont faits</p>
                    )}
                    <button onClick={() => {
                      if (!isLast) {
                        setVoteIndex(voteIndex + 1);
                        setVoteStep("choosing");
                      } else {
                        setVoteStep("allvoted");
                        setVoteIndex(voteOrder.length);
                      }
                    }} style={{ ...btnPrimaryConst, width: "100%", marginTop: 20 }}>
                      {!isLast ? "Votant suivant →" : "Tous les votes sont faits ✓"}
                    </button>
                  </div>
                );
                return null;
              })() : (
                // All voted — reveal button
                <div style={{ ...card, textAlign: "center", padding: "32px 24px" }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>🔮</div>
                  <h3 style={{ fontSize: 20, fontWeight: 800, fontFamily: "var(--font-display)" }}>Tous les votes sont tombés !</h3>
                  <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 8, marginBottom: 20 }}>
                    {voteOrder.length} joueurs ont voté en secret
                  </p>
                  {/* Vote progress dots */}
                  <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 20 }}>
                    {voteOrder.map((pIdx, i) => (
                      <div key={i} style={{
                        width: 10, height: 10, borderRadius: "50%",
                        background: "var(--accent)", opacity: 0.5 + (i * 0.05),
                      }} />
                    ))}
                  </div>
                  <button onClick={resolveVote} style={{ ...btnPrimaryConst, width: "100%", fontSize: 18 }}>
                    ⚡ Révéler le résultat
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    );
  }

  // ═══════════ ELIMINATION REVEAL ═══════════
  if (screen === "elimreveal" && elimRevealIdx !== null) {
    const ep = players[elimRevealIdx];
    const isCivil = ep.role === "civil";
    const isUC = ep.role === "undercover";
    const isMW = ep.role === "mrwhite";
    const ucWins = elimWinType === "undercover";
    const civilWins = elimWinType === "civil";

    const bgGradient = isCivil
      ? ucWins
        ? "radial-gradient(ellipse at 50% 40%, #2d1117 0%, #0C0C14 70%)"
        : "radial-gradient(ellipse at 50% 40%, #1a1a3e 0%, #0C0C14 70%)"
      : isUC
      ? "radial-gradient(ellipse at 50% 40%, #2d1117 0%, #0C0C14 70%)"
      : "radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0C0C14 70%)";

    const accentColor = isCivil ? (ucWins ? "#E63946" : "#4A90D9") : isUC ? "#E63946" : "#aaa";
    const roleLabel = isCivil ? "CIVIL" : isUC ? "UNDERCOVER" : "MR. WHITE";

    const ucPlayersAlive = players.filter((p) => p.alive && (p.role === "undercover" || p.role === "mrwhite"));
    const singleUC = ucPlayersAlive.length === 1;

    const flavorText = isCivil
      ? ucWins
        ? "C'en est fini pour les civils..."
        : "Mauvaise pioche... Un innocent tombe."
      : isUC
      ? civilWins
        ? "Le dernier imposteur est tombé !"
        : "Bien joué ! Un imposteur démasqué !"
      : "Le fantôme a été révélé !";
    const bigEmoji = isCivil ? (ucWins ? "💀" : "😵") : isUC ? "🎯" : "👻";

    return (
      <div style={{
        minHeight: "100vh", background: bgGradient, color: "var(--text)", fontFamily: "var(--font)",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        padding: "20px 16px", overflow: "hidden", position: "relative",
      }}>
        <style>{cssVars}</style>
        <style>{`
          @keyframes elimEnter { 0% { transform: scale(0) rotate(-10deg); opacity: 0; } 60% { transform: scale(1.15) rotate(3deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
          @keyframes elimShake { 0%,100% { transform: translateX(0); } 10%,30%,50%,70%,90% { transform: translateX(-6px); } 20%,40%,60%,80% { transform: translateX(6px); } }
          @keyframes elimGlow { 0%,100% { box-shadow: 0 0 20px ${accentColor}44; } 50% { box-shadow: 0 0 60px ${accentColor}88, 0 0 100px ${accentColor}44; } }
          @keyframes confetti1 { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-200px) translateX(80px) rotate(720deg); opacity: 0; } }
          @keyframes confetti2 { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-180px) translateX(-70px) rotate(-540deg); opacity: 0; } }
          @keyframes confetti3 { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-220px) translateX(40px) rotate(480deg); opacity: 0; } }
          @keyframes roleSlideIn { 0% { transform: translateY(30px) scale(0.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
          @keyframes skullFloat { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-10px) rotate(5deg); } }
          @keyframes fadeInUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
          @keyframes resultsFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        `}</style>

        {/* Confetti for UC elimination (civil catches UC) */}
        {isUC && !ucWins && elimAnimPhase >= 1 && (
          <>
            {["🎉","⭐","🔥","✨","🎊","💥","🏆","🎯"].map((e, i) => (
              <div key={i} style={{
                position: "absolute",
                top: `${40 + Math.random() * 20}%`, left: `${15 + (i * 10)}%`,
                fontSize: 24 + Math.random() * 16,
                animation: `confetti${(i % 3) + 1} ${1.5 + Math.random()}s ease-out ${i * 0.1}s forwards`,
                pointerEvents: "none",
              }}>{e}</div>
            ))}
          </>
        )}

        {/* Floating skulls for civil elimination */}
        {isCivil && elimAnimPhase >= 1 && (
          <>
            {(ucWins ? ["💀","🕵️","🔪","💀","🩸","☠️"] : ["💀","🥀","😢","💔"]).map((e, i) => (
              <div key={i} style={{
                position: "absolute",
                top: `${15 + i * 14}%`, left: `${8 + i * 18}%`,
                fontSize: ucWins ? 32 : 28, opacity: ucWins ? 0.45 : 0.3,
                animation: `skullFloat ${2 + i * 0.5}s ease-in-out infinite`,
                pointerEvents: "none",
              }}>{e}</div>
            ))}
          </>
        )}

        {/* Main card */}
        <div style={{
          animation: elimAnimPhase === 0 ? "elimEnter .8s cubic-bezier(.34,1.56,.64,1) forwards" : isCivil && elimAnimPhase === 1 ? "elimShake .6s ease" : "none",
          textAlign: "center", position: "relative",
        }}>
          {/* Avatar with glow */}
          <div style={{
            width: 120, height: 120, borderRadius: "50%", margin: "0 auto 20px",
            animation: elimAnimPhase >= 1 ? `elimGlow 2s ease-in-out infinite` : "none",
            display: "flex", alignItems: "center", justifyContent: "center",
            border: `4px solid ${accentColor}`,
            overflow: "hidden", background: "var(--surface)",
          }}>
            {ep.photo ? (
              <img src={ep.photo} alt="" style={{
                width: "100%", height: "100%", objectFit: "cover",
                filter: elimAnimPhase >= 1 ? (isCivil ? "grayscale(80%)" : "none") : "none",
                transition: "filter .8s",
              }} />
            ) : (
              <span style={{
                fontSize: 60,
                filter: elimAnimPhase >= 1 ? (isCivil ? "grayscale(80%)" : "none") : "none",
                transition: "filter .8s",
              }}>{ep.emoji}</span>
            )}
          </div>

          {/* Name */}
          <h2 style={{
            fontFamily: "var(--font-display)", fontSize: 28, fontWeight: 900,
            marginBottom: 8,
          }}>{ep.name}</h2>

          <p style={{ color: "var(--text2)", fontSize: 14, marginBottom: 20 }}>a été éliminé(e)...</p>

          {/* Role reveal */}
          {elimAnimPhase >= 1 && (
            <div style={{ animation: "roleSlideIn .5s cubic-bezier(.34,1.56,.64,1) forwards" }}>
              <div style={{ fontSize: 56, marginBottom: 12 }}>{bigEmoji}</div>
              <div style={{
                display: "inline-block", padding: "8px 24px", borderRadius: 16,
                background: accentColor + "22", border: `2px solid ${accentColor}`,
                marginBottom: 12,
              }}>
                <span style={{
                  fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 900,
                  color: accentColor, letterSpacing: 2,
                }}>{roleLabel}</span>
              </div>
              <p style={{
                fontSize: 15, color: ucWins ? "#E63946" : isCivil ? "#4A90D9" : isUC ? "#FF6B35" : "var(--text2)",
                fontWeight: 600, marginTop: 8,
                animation: "fadeInUp .4s ease .2s both",
              }}>{flavorText}</p>
            </div>
          )}

          {/* Word reveal — only when game ends, never mid-game */}
          {elimAnimPhase >= 1 && elimWinType && ep.word !== "???" && (
            <p style={{
              marginTop: 16, fontSize: 13, color: "var(--text3)",
              animation: "fadeInUp .4s ease .5s both",
            }}>
              Son mot : <strong style={{ color: "var(--text2)" }}>{ep.word}</strong>
            </p>
          )}

          {/* UC Winner showcase when undercover wins */}
          {elimAnimPhase >= 2 && ucWins && (
            <div style={{ marginTop: 24, animation: "fadeInUp .6s ease .2s both", textAlign: "center" }}>
              <div style={{ width: "100%", height: 1, background: "var(--border)", margin: "0 0 20px" }} />
              <p style={{ fontSize: 12, color: "var(--text3)", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>
                {singleUC ? "L'Undercover gagne" : "Les Undercovers gagnent"}
              </p>
              <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 8 }}>
                {ucPlayersAlive.map((p, i) => (
                  <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                    <Avatar emoji={p.emoji} photo={p.photo} size={singleUC ? 80 : 56} style={{
                      border: "3px solid #E63946",
                      boxShadow: "0 0 30px #E6394666, 0 0 60px #E6394633",
                      animation: "resultsFloat 2s ease-in-out infinite",
                    }} />
                    <span style={{ fontSize: 14, fontWeight: 800, color: "#E63946", fontFamily: "var(--font-display)" }}>{p.name}</span>
                  </div>
                ))}
              </div>
              <p style={{ fontSize: 13, color: "#FF6B35", fontWeight: 600 }}>
                {singleUC ? `${ucPlayersAlive[0]?.name} a bluffé tout le monde !` : "Ils ont bluffé tout le monde !"}
              </p>
            </div>
          )}
        </div>

        {/* Continue button — host only in multi */}
        {elimAnimPhase >= 2 && (playMode !== "multi" || isHost) && (
          <button onClick={() => {
            if (elimRevealCallback) elimRevealCallback();
          }} style={{
            ...btnPrimaryConst, marginTop: ucWins ? 24 : 40,
            animation: "fadeInUp .4s ease forwards",
            background: (isUC && !ucWins) ? "linear-gradient(135deg, #E63946, #FF6B35)"
              : ucWins ? "linear-gradient(135deg, #E63946, #FF006E)"
              : civilWins ? "linear-gradient(135deg, var(--accent), var(--accent2))"
              : "linear-gradient(135deg, var(--accent), var(--accent2))",
          }}>
            {ucWins ? "🕵️ Voir les résultats" : civilWins ? "🎉 Voir les résultats" : isUC ? "🎉 On continue !" : "😤 On continue..."}
          </button>
        )}
        {elimAnimPhase >= 2 && playMode === "multi" && !isHost && (
          <p style={{ marginTop: 32, color: "var(--text3)", fontSize: 13, textAlign: "center" }}>⏳ En attente de l'hôte…</p>
        )}
      </div>
    );
  }

  // ═══════════ SUDDEN DEATH ═══════════
  if (screen === "suddendeath") {
    const alive = getAlive();
    const allSdVoted = alive.every((p) => suddenDeathVotes[p.idx] !== undefined);

    if (randomElimMessage) return (
      <div style={{ ...cs, justifyContent: "center", minHeight: "100vh" }}><style>{cssVars}</style>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 64, marginBottom: 16, animation: "bounce 1s ease" }}>🎲</div>
          <h2 style={{ fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 900, color: "#FF6B35" }}>Élimination aléatoire</h2>
          <p style={{ fontSize: 18, fontWeight: 700, color: "#E63946", marginTop: 16, background: "#E6394611", padding: "12px 24px", borderRadius: 14 }}>{randomElimMessage}</p>
          <p style={{ fontSize: 13, color: "var(--text3)", marginTop: 16 }}>Après {MAX_SUDDEN_DEATH} morts subites sans résultat...</p>
        </div>
      </div>
    );

    return (
      <div style={cs}><style>{cssVars}</style>
        <div style={{ width: "100%", maxWidth: 420 }}>
          {playMode === "multi" && (() => {
            const me = mySlotIdx >= 0 ? players[mySlotIdx] : null;
            const amSpec = me && !me.alive;
            return (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, fontSize: 11, color: "var(--text3)", gap: 8 }}>
                <span style={{ fontFamily: "var(--font-mono)" }}>{isHost ? "🎯" : "🔗"} {roomCode}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {amSpec && <span style={{ background: "#88888822", color: "#888", padding: "3px 10px", borderRadius: 8, fontWeight: 700 }}>👻 SPECTATEUR</span>}
                  {me && me.alive && <span style={{ background: "#E6394622", color: "#E63946", padding: "3px 10px", borderRadius: 8, fontWeight: 700 }}>{me.name}</span>}
                  {isHost && (
                    <button onClick={() => {
                      if (window.confirm("Mettre fin à la partie en cours ? Tous les joueurs reviendront au lobby.")) endGameMulti();
                    }} style={{ background: "#E6394622", color: "#E63946", border: "1px solid #E6394644", borderRadius: 8, padding: "3px 10px", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>
                      🏁 Fin
                    </button>
                  )}
                </div>
              </div>
            );
          })()}
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontSize: 48, marginBottom: 8, animation: "pulse 1.5s infinite" }}>⚔️</div>
            <h2 style={{ fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 900, background: "linear-gradient(135deg, #E63946, #FF6B35)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>MORT SUBITE</h2>
            <span style={{ display: "inline-block", marginTop: 8, padding: "4px 14px", borderRadius: 20, background: "#E6394622", color: "#E63946", fontSize: 12, fontWeight: 700, fontFamily: "var(--font-mono)" }}>Round {suddenDeathCount} / {MAX_SUDDEN_DEATH}</span>
          </div>

          <div style={{ background: "var(--surface)", borderRadius: 16, padding: "16px 20px", border: "1px solid #E6394644", marginBottom: 16, textAlign: "center" }}>
            <p style={{ fontSize: 14, color: "#E63946", fontWeight: 600 }}>{tieMessage}</p>
            {suddenDeathCount >= MAX_SUDDEN_DEATH && <p style={{ fontSize: 11, color: "#F4A261", marginTop: 6 }}>⚠️ Dernier round ! Prochaine égalité → élimination aléatoire</p>}
          </div>

          {/* ── SD DESCRIBE PHASE (step by step, same order) ── */}
          {!sdAllSpoken ? (
            <>
              <div style={{ width: "100%", height: 4, background: "var(--surface2)", borderRadius: 2, marginBottom: 16, overflow: "hidden" }}>
                <div style={{ height: "100%", borderRadius: 2, background: "linear-gradient(90deg, #E63946, #FF6B35)", width: `${(sdSpeakingIndex / sdSpeakingOrder.length) * 100}%`, transition: "width .4s ease" }} />
              </div>
              {sdSpeakingOrder.length > 0 && sdSpeakingIndex < sdSpeakingOrder.length && (() => {
                const sp = players[sdSpeakingOrder[sdSpeakingIndex]];
                const isMyTurn = playMode === "multi" && sp && sp.playerId === myPlayerId;
                return (
                  <div style={{ ...card, textAlign: "center", padding: "28px 20px", border: "1px solid #E6394644", boxShadow: "0 8px 32px rgba(230,57,70,.15)", animation: "fadeUp .4s ease" }}>
                    <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 8, fontFamily: "var(--font-mono)" }}>Tour {sdSpeakingIndex + 1} / {sdSpeakingOrder.length}</p>
                    <Avatar emoji={sp.emoji} photo={sp.photo} size={60} style={{ margin: "0 auto 12px", border: "3px solid #E63946" }} />
                    <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 4 }}>C'est au tour de</p>
                    <h3 style={{ fontSize: 24, fontWeight: 900, fontFamily: "var(--font-display)", color: "#E63946" }}>{sp.name}{isMyTurn && " (toi)"}</h3>
                    <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 10 }}>
                      {playMode === "multi" ? (isMyTurn ? "À toi de défendre ton mot !" : "Écoute la défense.") : "Redonne un indice pour te défendre !"}
                    </p>
                    {timerEnabled && <div style={{ marginTop: 14, display: "flex", justifyContent: "center" }}><Timer key={`sd-${sdSpeakingIndex}`} seconds={Math.min(timerSeconds, 30)} onEnd={() => {}} /></div>}
                  </div>
                );
              })()}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 14, justifyContent: "center" }}>
                {sdSpeakingOrder.map((pIdx, i) => (
                  <div key={pIdx} style={{ display: "flex", alignItems: "center", gap: 4, padding: "3px 10px 3px 3px", borderRadius: 20, background: i < sdSpeakingIndex ? "#E6394615" : i === sdSpeakingIndex ? "#E63946" : "var(--surface2)", transition: "all .3s", opacity: i < sdSpeakingIndex ? .5 : 1 }}>
                    <Avatar emoji={players[pIdx]?.emoji} photo={players[pIdx]?.photo} size={22} style={{ border: "none" }} />
                    <span style={{ fontSize: 11, fontWeight: 600, color: i === sdSpeakingIndex ? "#fff" : "var(--text3)", textDecoration: i < sdSpeakingIndex ? "line-through" : "none" }}>{players[pIdx]?.name}</span>
                  </div>
                ))}
              </div>
              {(() => {
                const sp = players[sdSpeakingOrder[sdSpeakingIndex]];
                if (playMode === "multi") {
                  const isMyTurn = sp && sp.playerId === myPlayerId;
                  if (!isMyTurn) {
                    return (
                      <>
                        <div style={{ marginTop: 16, padding: "12px", background: "var(--surface2)", borderRadius: 12, textAlign: "center", color: "var(--text3)", fontSize: 13 }}>
                          ⏳ {sp?.name} doit cliquer sur son téléphone…
                          {sp && players[sdSpeakingOrder[sdSpeakingIndex]]?.connected === false && (
                            <div style={{ marginTop: 6, color: "#FF6B35", fontWeight: 700 }}>⚠️ {sp.name} est déconnecté</div>
                          )}
                        </div>
                        {isHost && (
                          <button onClick={hostForceAdvanceSdSpeaker} style={{ ...btnSecondaryConst, marginTop: 10, width: "100%", background: "#FFD16622", color: "#FFD166", border: "1px solid #FFD16644" }}>
                            ⏭️ Forcer le tour suivant <span style={{ fontSize: 11, opacity: .7 }}>(Hôte)</span>
                          </button>
                        )}
                      </>
                    );
                  }
                  const advance = () => {
                    if (isHost) {
                      if (sdSpeakingIndex < sdSpeakingOrder.length - 1) setSdSpeakingIndex(sdSpeakingIndex + 1);
                      else {
                        const aliveIdx = players.map((p, i) => (p.alive ? i : -1)).filter((i) => i >= 0);
                        setSdVoteOrder(shuffle(aliveIdx));
                        setSdVoteIndex(0);
                        setSdVoteStep("choosing");
                        setSdAllSpoken(true);
                      }
                    } else {
                      sendToHost({ type: "next_sd_speaker", playerId: myPlayerId });
                    }
                  };
                  return (
                    <button onClick={advance} style={{ ...btnPrimaryConst, marginTop: 16, width: "100%", background: "linear-gradient(135deg, #E63946, #FF6B35)" }}>
                      {sdSpeakingIndex < sdSpeakingOrder.length - 1 ? "✓ J'ai fini, joueur suivant →" : "✅ J'ai fini de parler"}
                    </button>
                  );
                }
                return (
                  <button onClick={() => {
                    if (sdSpeakingIndex < sdSpeakingOrder.length - 1) setSdSpeakingIndex(sdSpeakingIndex + 1);
                    else {
                      const aliveIdx = players.map((p, i) => (p.alive ? i : -1)).filter((i) => i >= 0);
                      setSdVoteOrder(shuffle(aliveIdx));
                      setSdVoteIndex(0);
                      setSdVoteStep("choosing");
                      setSdAllSpoken(true);
                    }
                  }} style={{ ...btnPrimaryConst, marginTop: 16, width: "100%", background: "linear-gradient(135deg, #E63946, #FF6B35)" }}>
                    {sdSpeakingIndex < sdSpeakingOrder.length - 1 ? "Joueur suivant →" : "✅ Passer au vote"}
                  </button>
                );
              })()}
            </>
          ) : (
            <>
              {/* ── SD VOTE — MULTI ── */}
              {playMode === "multi" ? (() => {
                const me = mySlotIdx >= 0 ? players[mySlotIdx] : null;
                const amAlive = !!(me && me.alive);
                const sdTargetsForMe = tiedPlayers.filter((tIdx) => tIdx !== mySlotIdx);
                const totalAlive = alive.length;
                const votesDone = isHost ? Object.keys(suddenDeathVotes).length : sdVoteCounts.done;
                const votesTotal = isHost ? sdVoteOrder.length : sdVoteCounts.total;
                const showCountdown = voteCountdown > 0;
                return (
                  <div>
                    <div style={{ display: "flex", justifyContent: "center", gap: 4, marginBottom: 14 }}>
                      {Array.from({ length: votesTotal || totalAlive }).map((_, i) => (
                        <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < votesDone ? "#E63946" : "var(--surface2)", transition: "background .3s" }} />
                      ))}
                    </div>
                    <p style={{ textAlign: "center", fontSize: 12, color: "var(--text3)", marginBottom: 16, fontFamily: "var(--font-mono)" }}>
                      {votesDone} / {votesTotal || totalAlive} ont voté
                    </p>
                    {isHost && !showCountdown && votesDone < (votesTotal || totalAlive) && Object.keys(suddenDeathVotes).length > 0 && (
                      <button onClick={() => setVoteCountdown(3)} style={{ ...btnSecondaryConst, width: "100%", marginBottom: 12, background: "#FFD16622", color: "#FFD166", border: "1px solid #FFD16644", padding: "10px" }}>
                        ⏭️ Forcer la résolution <span style={{ fontSize: 11, opacity: .7 }}>(Hôte)</span>
                      </button>
                    )}
                    {showCountdown ? (
                      <div style={{ ...card, textAlign: "center", padding: "40px 24px" }}>
                        <div style={{ fontSize: 12, color: "var(--text3)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 2 }}>Révélation dans</div>
                        <div style={{ fontSize: 80, fontWeight: 900, fontFamily: "var(--font-display)", color: "#E63946", animation: "pulse 1s infinite", lineHeight: 1 }}>{voteCountdown}</div>
                      </div>
                    ) : !amAlive ? (
                      <div style={{ ...card, textAlign: "center", padding: "32px 24px" }}>
                        <div style={{ fontSize: 40, marginBottom: 8 }}>👻</div>
                        <h3 style={{ fontSize: 16, fontWeight: 800, color: "#888" }}>Mode spectateur</h3>
                        <p style={{ fontSize: 13, color: "var(--text3)", marginTop: 8 }}>Tu observes la mort subite.</p>
                      </div>
                    ) : iSdVoted ? (
                      <div style={{ ...card, textAlign: "center", padding: "28px 24px" }}>
                        <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
                        <h3 style={{ fontSize: 18, fontWeight: 800, color: "#E63946" }}>Vote enregistré !</h3>
                        <p style={{ fontSize: 13, color: "var(--text3)", marginTop: 8 }}>En attente des autres…</p>
                      </div>
                    ) : (
                      <div style={{ ...card, padding: "20px 16px" }}>
                        <div style={{ textAlign: "center", marginBottom: 14 }}>
                          <div style={{ fontSize: 32, marginBottom: 4 }}>⚔️</div>
                          <p style={{ fontSize: 15, fontWeight: 700 }}>Qui veux-tu éliminer ?</p>
                          <p style={{ fontSize: 11, color: "var(--text3)", marginTop: 4 }}>Vote secret entre les ex-aequo</p>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {sdTargetsForMe.map((tIdx) => (
                            <button key={tIdx} onClick={() => {
                              if (isHost) {
                                setSuddenDeathVotes((p) => ({ ...p, [mySlotIdx]: tIdx }));
                              } else {
                                sendToHost({ type: "cast_sd_vote", playerId: myPlayerId, targetIdx: tIdx });
                              }
                              setISdVoted(true);
                            }} style={{
                              padding: "14px 16px", borderRadius: 14, cursor: "pointer", fontSize: 15, fontWeight: 600,
                              border: "2px solid #E6394644", display: "flex", alignItems: "center", gap: 10,
                              background: "var(--surface2)", color: "var(--text)", width: "100%",
                            }}>
                              <Avatar emoji={players[tIdx]?.emoji} photo={players[tIdx]?.photo} size={32} style={{ border: "none" }} />
                              {players[tIdx]?.name}
                            </button>
                          ))}
                          {sdTargetsForMe.length === 0 && (
                            <p style={{ textAlign: "center", color: "var(--text3)", fontSize: 13 }}>Tu n'es pas dans les ex-aequo. Tu peux voter pour n'importe qui parmi eux.</p>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })() : (
                /* ── SD VOTE — SOLO (original) ── */
                <>
                  {sdVoteIndex < sdVoteOrder.length ? (() => {
                    const voterIdx = sdVoteOrder[sdVoteIndex];
                    const voter = players[voterIdx];
                    const sdTargets = tiedPlayers.filter((tIdx) => tIdx !== voterIdx);
                    const isLastSd = sdVoteIndex >= sdVoteOrder.length - 1;
                    const nextSdVoter = !isLastSd ? players[sdVoteOrder[sdVoteIndex + 1]] : null;

                    if (sdVoteStep === "choosing") return (
                      <div style={{ ...card, textAlign: "center", padding: "24px 20px", animation: "fadeUp .3s ease" }}>
                        <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 12, fontFamily: "var(--font-mono)" }}>
                          Vote {sdVoteIndex + 1} / {sdVoteOrder.length}
                        </p>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 16 }}>
                          <Avatar emoji={voter.emoji} photo={voter.photo} size={32} style={{ border: "none" }} />
                          <h3 style={{ fontSize: 18, fontWeight: 800, fontFamily: "var(--font-display)" }}>{voter.name}, qui éliminer ?</h3>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {sdTargets.map((tIdx) => (
                            <button key={tIdx} onClick={() => { castSdVote(voterIdx, tIdx); setSdVoteStep("confirmed"); }} style={{
                              padding: "14px 16px", borderRadius: 14, cursor: "pointer", fontSize: 15, fontWeight: 600,
                              transition: "all .2s", border: "2px solid #E6394644", display: "flex", alignItems: "center", gap: 10,
                              background: "var(--surface2)", color: "var(--text)", width: "100%",
                            }}>
                              <Avatar emoji={players[tIdx]?.emoji} photo={players[tIdx]?.photo} size={32} style={{ border: "none" }} />
                              {players[tIdx]?.name}
                            </button>
                          ))}
                        </div>
                      </div>
                    );

                    if (sdVoteStep === "confirmed") return (
                      <div style={{ ...card, textAlign: "center", padding: "28px 24px", animation: "fadeUp .3s ease" }}>
                        <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
                        <h3 style={{ fontSize: 18, fontWeight: 800, fontFamily: "var(--font-display)", color: "#E63946" }}>Vote enregistré !</h3>
                        {nextSdVoter ? (
                          <>
                            <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 16, marginBottom: 4 }}>Passe le téléphone à</p>
                            <Avatar emoji={nextSdVoter.emoji} photo={nextSdVoter.photo} size={56} style={{ margin: "8px auto", border: "3px solid #E63946" }} />
                            <h4 style={{ fontSize: 22, fontWeight: 900, fontFamily: "var(--font-display)", color: "#E63946" }}>{nextSdVoter.name}</h4>
                            <p style={{ fontSize: 11, color: "var(--text3)", marginTop: 8 }}>Les autres, ne regardez pas !</p>
                          </>
                        ) : (
                          <p style={{ fontSize: 13, color: "var(--text3)", marginTop: 8 }}>Tous les votes sont faits</p>
                        )}
                        <button onClick={() => {
                          if (!isLastSd) {
                            setSdVoteIndex(sdVoteIndex + 1);
                            setSdVoteStep("choosing");
                          } else {
                            setSdVoteStep("allvoted");
                            setSdVoteIndex(sdVoteOrder.length);
                          }
                        }} style={{ ...btnPrimaryConst, width: "100%", marginTop: 20, background: "linear-gradient(135deg, #E63946, #FF6B35)" }}>
                          {!isLastSd ? "Votant suivant →" : "Tous les votes sont faits ✓"}
                        </button>
                      </div>
                    );
                    return null;
                  })() : (
                    <div style={{ ...card, textAlign: "center", padding: "32px 24px" }}>
                      <div style={{ fontSize: 48, marginBottom: 12 }}>🔮</div>
                      <h3 style={{ fontSize: 20, fontWeight: 800, fontFamily: "var(--font-display)" }}>Tous les votes sont tombés !</h3>
                      <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 8, marginBottom: 20 }}>{sdVoteOrder.length} votes secrets</p>
                      <button onClick={resolveSd} style={{ ...btnPrimaryConst, width: "100%", fontSize: 18, background: "linear-gradient(135deg, #E63946, #FF6B35)" }}>
                        ⚡ Résoudre
                      </button>
                    </div>
                  )}
                </>
              )}
            </>
          )}
        </div>
      </div>
    );
  }

  // ═══════════ RESULTS ═══════════
  if (screen === "results") {
    const ucPlayers = players.filter((p) => p.role === "undercover" || p.role === "mrwhite");
    const civilWin = winner === "civil";
    const singleUC = ucPlayers.length === 1;

    const wt = civilWin
      ? "Les Civils gagnent !"
      : singleUC
        ? `${ucPlayers[0].name} remporte la partie !`
        : "Les Undercovers gagnent !";
    const wc = civilWin ? "var(--accent)" : "#E63946";

    return (
      <div style={{ ...cs, justifyContent: "center" }}><style>{cssVars}</style>
        <style>{`
          @keyframes resultsPop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
          @keyframes resultsFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
          @keyframes resultsConfetti { 0% { transform: translateY(0) rotate(0); opacity:1; } 100% { transform: translateY(-160px) translateX(var(--dx)) rotate(var(--rot)); opacity:0; } }
          @keyframes resultsFadeIn { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        `}</style>

        {/* Confetti */}
        {["🎉","⭐","✨","🎊","🏆","💥","🔥","🎯","🥳","💎"].map((e, i) => (
          <div key={i} style={{
            position: "fixed", top: `${50 + Math.sin(i) * 20}%`, left: `${5 + i * 9.5}%`,
            fontSize: 20 + (i % 3) * 8, pointerEvents: "none",
            animation: `resultsConfetti ${2 + i * 0.2}s ease-out ${i * 0.15}s forwards`,
            ["--dx"]: `${-60 + i * 15}px`, ["--rot"]: `${360 + i * 90}deg`,
          }}>{e}</div>
        ))}

        <div style={{ textAlign: "center", animation: "resultsPop .6s cubic-bezier(.34,1.56,.64,1) forwards" }}>
          {/* Winner showcase */}
          {civilWin ? (
            <div style={{ fontSize: 80, marginBottom: 16, animation: "resultsFloat 2s ease-in-out infinite" }}>🎉</div>
          ) : (
            <div style={{ marginBottom: 20 }}>
              {singleUC ? (
                <div style={{ animation: "resultsFloat 2s ease-in-out infinite" }}>
                  <Avatar emoji={ucPlayers[0].emoji} photo={ucPlayers[0].photo} size={100} style={{
                    margin: "0 auto", border: `4px solid #E63946`,
                    boxShadow: "0 0 40px #E6394666, 0 0 80px #E6394633",
                  }} />
                </div>
              ) : (
                <div style={{ display: "flex", justifyContent: "center", gap: 12, animation: "resultsFloat 2s ease-in-out infinite" }}>
                  {ucPlayers.map((p, i) => (
                    <Avatar key={i} emoji={p.emoji} photo={p.photo} size={72} style={{
                      border: `3px solid #E63946`,
                      boxShadow: "0 0 30px #E6394644",
                    }} />
                  ))}
                </div>
              )}
            </div>
          )}

          <h1 style={{
            fontFamily: "var(--font-display)", fontSize: civilWin ? 32 : 28, fontWeight: 900,
            color: wc, lineHeight: 1.2, maxWidth: 340, margin: "0 auto",
          }}>{wt}</h1>

          {!civilWin && singleUC && (
            <p style={{ color: "#FF6B35", fontSize: 14, fontWeight: 600, marginTop: 8, animation: "resultsFadeIn .5s ease .3s both" }}>
              🕵️ L'Undercover a bluffé tout le monde !
            </p>
          )}
          {!civilWin && !singleUC && (
            <p style={{ color: "#FF6B35", fontSize: 14, fontWeight: 600, marginTop: 8, animation: "resultsFadeIn .5s ease .3s both" }}>
              🕵️ {ucPlayers.map((p) => p.name).join(" & ")} ont bluffé tout le monde !
            </p>
          )}
        </div>

        <div style={{ ...card, width: "100%", maxWidth: 360, marginTop: 32, animation: "resultsFadeIn .5s ease .4s both" }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>Récapitulatif</h3>
          {players.map((p, i) => {
            const rc = p.role === "civil" ? "var(--accent)" : p.role === "undercover" ? "#E63946" : "#888";
            return (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid var(--border)" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Avatar emoji={p.emoji} photo={p.photo} size={28} style={{ border: "none" }} />
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{p.name}</span>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 8, background: rc + "22", color: rc }}>
                    {p.role === "civil" ? "Civil" : p.role === "undercover" ? "Undercover" : "Mr. White"}
                  </span>
                  {!p.alive && <span style={{ fontSize: 11 }}>☠️</span>}
                </div>
                <span style={{ fontSize: 13, color: "var(--text2)", fontStyle: "italic" }}>{p.word}</span>
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 24, width: "100%", maxWidth: 360, animation: "resultsFadeIn .5s ease .6s both" }}>
          {playMode === "multi" ? (
            isHost ? (
              <>
                <button onClick={() => {
                  // Go back to lobby — keep room, players reconnect / stay
                  setRound((r) => r + 1);
                  // Rebuild lobbyPlayers from current connected players (excluding host)
                  const stillConnected = players.filter(p => p.connected !== false && p.playerId !== myPlayerId)
                    .map(p => ({ playerId: p.playerId, name: p.name, emoji: p.emoji, photo: p.photo, connected: true }));
                  setLobbyPlayers(stillConnected);
                  setPlayers([]);
                  setMySlotIdx(-1); setMyWord(null); setMyRole(null);
                  setEliminated([]); setVotes({}); setSuddenDeathVotes({}); setWinner(null);
                  setVoteCountdown(0); setIVoted(false); setISdVoted(false);
                  transition(() => setScreen("multi_lobby"));
                }} style={{ ...btnPrimaryConst, flex: 1 }}>🔄 Retour au lobby</button>
                <button onClick={() => { leaveRoom(); setScores({}); setRound(1); setUsedPairs([]); transition(() => setScreen("home")); }} style={{ ...btnSecondaryConst, flex: 1 }}>🏠 Accueil</button>
              </>
            ) : (
              <>
                <button onClick={() => {
                  setMySlotIdx(-1); setMyWord(null); setMyRole(null);
                  setVoteCountdown(0); setIVoted(false); setISdVoted(false);
                  transition(() => setScreen("multi_lobby"));
                }} style={{ ...btnPrimaryConst, flex: 1 }}>🔄 Retour au lobby</button>
                <button onClick={() => { leaveRoom(); setScores({}); setRound(1); setUsedPairs([]); transition(() => setScreen("home")); }} style={{ ...btnSecondaryConst, flex: 1 }}>🏠 Quitter</button>
              </>
            )
          ) : (
            <>
              <button onClick={newRound} style={{ ...btnPrimaryConst, flex: 1 }}>🔄 Nouvelle manche</button>
              <button onClick={() => { setScores({}); setRound(1); setUsedPairs([]); transition(() => setScreen("home")); }} style={{ ...btnSecondaryConst, flex: 1 }}>🏠 Accueil</button>
            </>
          )}
        </div>
      </div>
    );
  }

  return null;
}

// ─── STYLES ──────────────────────────────────────────────────
const cssVars = `
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700;800&display=swap');
  :root {
    --bg: #0C0C14; --surface: #14141F; --surface2: #1E1E2E; --border: #2A2A3C;
    --text: #E8E8F0; --text2: #8888A0; --text3: #555570;
    --accent: #6C5CE7; --accent2: #A855F7;
    --font: 'Outfit', sans-serif; --font-display: 'Sora', sans-serif; --font-mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: .7; } }
  @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  input::placeholder { color: var(--text3); }
`;

const btnPrimaryConst = { background: "linear-gradient(135deg, var(--accent), var(--accent2))", color: "#fff", border: "none", borderRadius: 14, padding: "16px 32px", fontSize: 16, fontWeight: 700, fontFamily: "var(--font)", cursor: "pointer", transition: "all .2s", letterSpacing: .3 };
const btnSecondaryConst = { background: "var(--surface2)", color: "var(--text2)", border: "1px solid var(--border)", borderRadius: 14, padding: "16px 32px", fontSize: 16, fontWeight: 700, fontFamily: "var(--font)", cursor: "pointer", transition: "all .2s" };
const btnBack = { background: "none", border: "none", color: "var(--text2)", fontSize: 14, cursor: "pointer", alignSelf: "flex-start", marginBottom: 16, fontFamily: "var(--font)" };
const btnSmall = { width: 40, height: 40, borderRadius: 12, border: "none", background: "var(--surface2)", color: "var(--text)", fontSize: 20, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-mono)" };
const card = { background: "var(--surface)", borderRadius: 18, padding: "20px 20px", border: "1px solid var(--border)", width: "100%", maxWidth: 400, marginTop: 12 };
const labelStyle = { fontSize: 13, fontWeight: 700, color: "var(--text2)", textTransform: "uppercase", letterSpacing: 1.5 };
const sectionTitle = { fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 800, marginBottom: 8 };
const chipStyle = { padding: "12px 8px", borderRadius: 14, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all .2s", border: "none", fontFamily: "var(--font)" };
const chipStyleSmall = { padding: "10px 6px", borderRadius: 12, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all .2s", border: "none", fontFamily: "var(--font)" };
const inputStyle = { width: "100%", padding: "12px 16px", borderRadius: 12, border: "1px solid var(--border)", background: "var(--surface2)", color: "var(--text)", fontSize: 15, fontFamily: "var(--font)", outline: "none", marginTop: 8 };

    // ─── RENDER ───
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(UndercoverApp));

    // Hide splash
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if (splash) { splash.classList.add('hide'); setTimeout(() => splash.remove(), 500); }
    }, 800);
  </script>

  <script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((r) => console.log('SW registered:', r.scope))
          .catch((e) => console.log('SW failed:', e));
      });
    }

    // iOS standalone — prevent pull-to-refresh only, not scroll
    if (window.navigator.standalone) {
      document.addEventListener('touchmove', function(e) {
        if (e.target.closest('#root')) return; // allow scroll inside app
        e.preventDefault();
      }, { passive: false });
    }
  </script>
</body>
