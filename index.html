// ─── UTILITY ─────────────────────────────────────────────────
const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];

// ─── SMART WORD ENGINE ───────────────────────────────────────
// Weighted random pick: higher weight = more likely to be chosen
function weightedPick(pairs) {
  const totalWeight = pairs.reduce((s, p) => s + (p[2] || 2), 0);
  let r = Math.random() * totalWeight;
  for (const p of pairs) {
    r -= (p[2] || 2);
    if (r <= 0) return p;
  }
  return pairs[pairs.length - 1];
}

function generateWords(theme, difficulty, mixThemes, usedPairs = []) {
  // Helper: get all pairs for a theme across all difficulties
  const getAllPairs = (t) => [
    ...(WORD_DB[t]?.facile || []),
    ...(WORD_DB[t]?.moyen || []),
    ...(WORD_DB[t]?.difficile || []),
  ];

  // Helper: get pairs for a theme at a specific difficulty
  const getDiffPairs = (t, d) => {
    if (d === "mixte") return getAllPairs(t);
    return WORD_DB[t]?.[d] || WORD_DB[t]?.["facile"] || [];
  };

  // Resolve pool
  let pool;
  if (theme === "mix") {
    // Use selected sub-themes if 2+, otherwise default to ALL available themes
    let validThemes = (mixThemes || []).filter((t) => t !== "custom" && t !== "mix");
    if (validThemes.length < 2) {
      validThemes = Object.keys(WORD_DB).filter((t) => t !== "custom");
    }
    pool = [];
    for (const t of validThemes) pool.push(...getDiffPairs(t, difficulty));
  } else {
    pool = getDiffPairs(theme, difficulty);
  }
  if (!pool.length) return { pair: ["Mot 1", "Mot 2"], key: "Mot 1|Mot 2" };

  // Anti-repeat filter
  const usedKeys = new Set(usedPairs);
  const available = pool.filter((p) => !usedKeys.has(p[0] + "|" + p[1]));

  // If all exhausted, keep anti-repeat only for last 3 pairs played
  const source = available.length > 0 ? available : pool.filter(
    (p) => !new Set(usedPairs.slice(-3)).has(p[0] + "|" + p[1])
  );
  const finalPool = source.length > 0 ? source : pool;

  // Weighted selection
  const pair = weightedPick(finalPool);
  return { pair: [pair[0], pair[1]], key: pair[0] + "|" + pair[1] };
}

function assignRoles(count, mode, customUC = 1, customMW = 0) {
  let uc = 1, mwCount = 0;
  if (mode === "classique") { uc = 1; mwCount = 0; }
  else if (mode === "extreme") { uc = Math.max(1, Math.floor((count - 1) / 3)); mwCount = 1; }
  else if (mode === "perso") { uc = customUC; mwCount = customMW; }
  // Clamp to valid range
  const maxSpecial = count - 1;
  uc = Math.min(uc, maxSpecial);
  mwCount = Math.min(mwCount, maxSpecial - uc);
  const roles = Array(count).fill("civil");
  const idx = shuffle([...Array(count).keys()]);
  let a = 0;
  for (let i = 0; i < idx.length && a < uc; i++) { roles[idx[i]] = "undercover"; a++; }
  let mwAssigned = 0;
  for (let i = a; i < idx.length && mwAssigned < mwCount; i++) {
    if (roles[idx[i]] === "civil") { roles[idx[i]] = "mrwhite"; mwAssigned++; }
  }
  return roles;
}

// ─── TIMER ───────────────────────────────────────────────────
const Timer = ({ seconds, onEnd }) => {
  const [time, setTime] = useState(seconds);
  const [running, setRunning] = useState(false);
  const ref = useRef(null);
  useEffect(() => { setTime(seconds); setRunning(false); if (ref.current) clearInterval(ref.current); }, [seconds]);
  const toggle = () => {
    if (running) { clearInterval(ref.current); setRunning(false); }
    else { setRunning(true); ref.current = setInterval(() => { setTime((t) => { if (t <= 1) { clearInterval(ref.current); setRunning(false); onEnd?.(); return 0; } return t - 1; }); }, 1000); }
  };
  const reset = () => { clearInterval(ref.current); setTime(seconds); setRunning(false); };
  const pct = (time / seconds) * 100;
  const color = pct > 50 ? "var(--accent)" : pct > 20 ? "#F4A261" : "#E63946";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <div onClick={toggle} style={{ width: 56, height: 56, borderRadius: "50%", background: `conic-gradient(${color} ${pct}%, var(--surface2) ${pct}%)`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
        <div style={{ width: 44, height: 44, borderRadius: "50%", background: "var(--surface)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 700, fontFamily: "var(--font-mono)", color }}>{time}s</div>
      </div>
      <button onClick={reset} style={{ background: "none", border: "1px solid var(--border)", borderRadius: 8, color: "var(--text2)", padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>↺</button>
    </div>
  );
};

// ─── CAMERA MODAL ────────────────────────────────────────────
const CameraModal = ({ onCapture, onClose }) => {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    let cancelled = false;
    navigator.mediaDevices?.getUserMedia({ video: { facingMode: "user", width: 300, height: 300 } })
      .then((stream) => {
        if (cancelled) { stream.getTracks().forEach((t) => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
        setReady(true);
      })
      .catch(() => { alert("Impossible d'accéder à la caméra"); onClose(); });
    return () => { cancelled = true; streamRef.current?.getTracks().forEach((t) => t.stop()); };
  }, []);

  const capture = () => {
    const video = videoRef.current;
    if (!video) return;
    const canvas = document.createElement("canvas");
    canvas.width = 300; canvas.height = 300;
    const ctx = canvas.getContext("2d");
    const s = Math.min(video.videoWidth, video.videoHeight);
    const sx = (video.videoWidth - s) / 2, sy = (video.videoHeight - s) / 2;
    ctx.drawImage(video, sx, sy, s, s, 0, 0, 300, 300);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
    streamRef.current?.getTracks().forEach((t) => t.stop());
    onCapture(dataUrl);
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,.85)",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: 20,
    }}>
      <div style={{
        width: 260, height: 260, borderRadius: "50%", overflow: "hidden",
        border: "3px solid var(--accent)", marginBottom: 24,
      }}>
        <video ref={videoRef} muted playsInline style={{ width: "100%", height: "100%", objectFit: "cover" }} />
      </div>
      <div style={{ display: "flex", gap: 16 }}>
        <button onClick={capture} disabled={!ready} style={{
          ...btnPrimaryConst, opacity: ready ? 1 : .4, padding: "14px 32px",
        }}>📸 Capturer</button>
        <button onClick={() => { streamRef.current?.getTracks().forEach((t) => t.stop()); onClose(); }} style={{
          ...btnSecondaryConst, padding: "14px 32px",
        }}>Annuler</button>
      </div>
    </div>
  );
};

// ─── MULTI / PEERJS HELPERS ────────────────────────────────────
const ROOM_PREFIX = "wundercover-";
const ROOM_CODE_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no I/O/0/1 ambiguity
const generateRoomCode = () => {
  let s = "";
  for (let i = 0; i < 6; i++) s += ROOM_CODE_CHARS[Math.floor(Math.random() * ROOM_CODE_CHARS.length)];
  return s;
};
const generatePlayerId = () => "p" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

const QRCanvas = ({ value, size = 160 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !value || typeof QRCode === "undefined") return;
    ref.current.innerHTML = "";
    new QRCode(ref.current, { text: value, width: size, height: size, correctLevel: QRCode.CorrectLevel.M, colorDark: "#0C0C14", colorLight: "#FFFFFF" });
  }, [value, size]);
  return <div ref={ref} style={{ display: "inline-block", padding: 8, background: "#fff", borderRadius: 12 }} />;
};

// Strip private fields from a player record before broadcasting state.
// Eliminated players' role/word are public (revealed). Alive players' are private.
// When `revealAll` is true (game ended), everyone's role/word becomes public.
const sanitizePlayersForBroadcast = (players, revealAll) => players.map((p) => ({
  playerId: p.playerId,
  name: p.name,
  emoji: p.emoji,
  photo: p.photo,
  alive: p.alive,
  connected: p.connected !== false,
  role: (revealAll || !p.alive) ? p.role : null,
  word: (revealAll || !p.alive) ? p.word : null,
}));

  const [voteOrder, setVoteOrder] = useState([]);

  const [tiedPlayers, setTiedPlayers] = useState([]);

  const [tieMessage, setTieMessage] = useState("");
  const [randomElimMessage, setRandomElimMessage] = useState("");
  const [sdSpeakingIndex, setSdSpeakingIndex] = useState(0);
  const [sdAllSpoken, setSdAllSpoken] = useState(false);
  const [sdSpeakingOrder, setSdSpeakingOrder] = useState([]);
  const [sdVoteOrder, setSdVoteOrder] = useState([]);
  const [sdVoteIndex, setSdVoteIndex] = useState(0);
  const [sdVoteStep, setSdVoteStep] = useState("choosing");
  const MAX_SUDDEN_DEATH = 2;

  const [cameraOpenFor, setCameraOpenFor] = useState(null); // player index or null
  const [elimRevealIdx, setElimRevealIdx] = useState(null); // player index being revealed
  const [elimRevealCallback, setElimRevealCallback] = useState(null); // what to do after anim
  const [elimAnimPhase, setElimAnimPhase] = useState(0); // 0=enter, 1=role reveal, 2=ready
  const [elimWinType, setElimWinType] = useState(null); // null | "civil" | "undercover"

  const [fadeIn, setFadeIn] = useState(true);
  const transition = (next) => { setFadeIn(false); setTimeout(() => { next(); setFadeIn(true); }, 300); };

  // ── MULTI / PEERJS STATE ──
  const [playMode, setPlayMode] = useState("solo"); // "solo" | "multi"
  const [isHost, setIsHost] = useState(false);
  const [roomCode, setRoomCode] = useState("");
  const [myPlayerId, setMyPlayerId] = useState(""); // own id (host or client)
  const [myPseudo, setMyPseudo] = useState("");
  const [myEmoji, setMyEmoji] = useState("😎");
  const [myPhoto, setMyPhoto] = useState(null);
  const [mySlotIdx, setMySlotIdx] = useState(-1); // index in players once game starts
  const [myWord, setMyWord] = useState(null); // own word (set when game starts)
  const [myRole, setMyRole] = useState(null); // own role
  const [lobbyPlayers, setLobbyPlayers] = useState([]); // [{playerId,name,emoji,photo,connected}]
  const [slotsCount, setSlotsCount] = useState(5);
  const [joinCode, setJoinCode] = useState("");
  const [networkError, setNetworkError] = useState("");
  const [hostPlayerId, setHostPlayerId] = useState(""); // who is the host
  const [voteCounts, setVoteCounts] = useState({ done: 0, total: 0 }); // for clients to see progress
  const [sdVoteCounts, setSdVoteCounts] = useState({ done: 0, total: 0 });
  const [voteCountdown, setVoteCountdown] = useState(0); // 3,2,1,0 before reveal
  const [iVoted, setIVoted] = useState(false);
  const [iSdVoted, setISdVoted] = useState(false);
  const [iAmReadyForReveal, setIAmReadyForReveal] = useState(false);
  // Refs for PeerJS
  const peerRef = useRef(null);
  const connsRef = useRef(new Map()); // host: playerId -> DataConnection
  const hostConnRef = useRef(null);   // client: connection to host
  const isHostRef = useRef(false);    // mirror of isHost for use in refs/handlers
  const myPlayerIdRef = useRef("");
  const myPseudoRef = useRef("");
  const myEmojiRef = useRef("😎");
  const myPhotoRef = useRef(null);
  const lobbyPlayersRef = useRef([]);
  const slotsCountRef = useRef(5);
  const broadcastRef = useRef(null);  // will hold the broadcast function
  // Refs to latest handlers to avoid stale closures inside PeerJS callbacks
  const onHostReceiveRef = useRef(null);
  const onHostClientDisconnectRef = useRef(null);
  const onClientReceiveRef = useRef(null);
  const onHostDisconnectRef = useRef(null);
  const isClient = playMode === "multi" && !isHost;
  // Wake lock
  const wakeLockRef = useRef(null);

  const defaultEmojis = ["😎","🤠","🥳","🧑‍🎤","🦊","🐱","🐸","🦄","🤖","👽","🎃","🐼","🦁","🐧","🐙","🦋","🍎","🍊","⭐","🔥"];

  useEffect(() => {
    setPlayerNames((p) => { const n = [...p]; while (n.length < playerCount) n.push(""); return n.slice(0, playerCount); });
    setPlayerEmojis((p) => { const n = [...p]; while (n.length < playerCount) n.push(defaultEmojis[n.length % defaultEmojis.length]); return n.slice(0, playerCount); });
    setPlayerPhotos((p) => { const n = [...p]; while (n.length < playerCount) n.push(null); return n.slice(0, playerCount); });
    // Clamp custom roles
    setCustomUC((v) => Math.min(v, playerCount - 1));
    setCustomMW((v) => Math.min(v, Math.max(0, playerCount - 1 - customUC)));
  }, [playerCount]);

  const updateName = (i, v) => setPlayerNames((p) => { const n = [...p]; n[i] = v; return n; });
  const updateEmoji = (i, e) => { setPlayerEmojis((p) => { const n = [...p]; n[i] = e; return n; }); setPlayerPhotos((p) => { const n = [...p]; n[i] = null; return n; }); };
  const updatePhoto = (i, url) => setPlayerPhotos((p) => { const n = [...p]; n[i] = url; return n; });
  const getFinalNames = () => playerNames.map((n, i) => (n.trim() || `Joueur ${i + 1}`));

  // Speaking order (Mr. White never first)
  const generateSpeakingOrder = (ps) => {
    const alive = (ps || players).map((p, i) => (p.alive ? i : -1)).filter((i) => i >= 0);
    let order = shuffle(alive);
    if (order.length > 1 && (ps || players)[order[0]]?.role === "mrwhite") {
      const sw = order.findIndex((i) => (ps || players)[i].role !== "mrwhite");
      if (sw > 0) [order[0], order[sw]] = [order[sw], order[0]];
    }
    return order;
  };

  const startDescribePhase = (ps) => {
    const order = generateSpeakingOrder(ps);
    setSpeakingOrder(order);
    setSpeakingIndex(0);
    setAllSpoken(false);
    setGamePhase("describe");
    setIVoted(false);
    setISdVoted(false);
    setVoteCountdown(0);
  };

  // ── Game logic ──
  const startGame = () => {
    let words;
    {
      const result = generateWords(theme, difficulty, mixThemes, usedPairs);
      words = result.pair;
      setUsedPairs((prev) => [...prev, result.key]);
    }
    const roles = assignRoles(playerCount, mode, customUC, customMW);
    const names = getFinalNames();
    const np = names.map((name, i) => ({
      name, role: roles[i],
      word: roles[i] === "civil" ? words[0] : roles[i] === "undercover" ? words[1] : "???",
      alive: true, emoji: playerEmojis[i], photo: playerPhotos[i],
    }));
    setPlayers(np); setRevealIndex(0); setWordVisible(false);
    setEliminated([]); setVotes({}); setWinner(null);
    setSuddenDeathCount(0); setTiedPlayers([]); setSuddenDeathVotes({});
    setTieMessage(""); setRandomElimMessage("");
    transition(() => setScreen("reveal"));
  };

  // Multi version: lobbyList = [{playerId, name, emoji, photo}, ...] in order (host first)
  const startGameMulti = (lobbyList) => {
    const result = generateWords(theme, difficulty, mixThemes, usedPairs);
    const words = result.pair;
    setUsedPairs((prev) => [...prev, result.key]);
    // Shuffle the player list so the host doesn't systematically end up at slot 0.
    // Roles and speaking order are independently randomized too, but shuffling here also
    // randomizes the visible slot positions on the game/results screens.
    const shuffledLobby = shuffle(lobbyList);
    const count = shuffledLobby.length;
    const roles = assignRoles(count, mode, customUC, customMW);
    const np = shuffledLobby.map((p, i) => ({
      playerId: p.playerId,
      name: p.name,
      emoji: p.emoji,
      photo: p.photo,
      role: roles[i],
      word: roles[i] === "civil" ? words[0] : roles[i] === "undercover" ? words[1] : "???",
      alive: true,
      connected: true,
    }));
    setPlayers(np);
    setRevealIndex(0); setWordVisible(false);
    setEliminated([]); setVotes({}); setWinner(null);
    setSuddenDeathCount(0); setTiedPlayers([]); setSuddenDeathVotes({});
    setTieMessage(""); setRandomElimMessage("");
    setVoteCountdown(0); setIVoted(false); setISdVoted(false);
    setAllSpoken(false); setSdAllSpoken(false);
    setSpeakingIndex(0); setSdSpeakingIndex(0);

    // Send each non-host player their private role/word
    np.forEach((p, idx) => {
      if (p.playerId === myPlayerId) {
        // Host: set own state
        setMySlotIdx(idx);
        setMyWord(p.word);
        setMyRole(p.role);
      } else {
        const conn = connsRef.current.get(p.playerId);
        if (conn) sendToConn(conn, { type: "your_role", word: p.word, role: p.role, slotIdx: idx });
      }
    });

    // Move everyone to reveal screen — host triggers transition; clients follow via state broadcast effect
    transition(() => setScreen("reveal"));
  };

  const nextReveal = () => {
    if (wordVisible) {
      setWordVisible(false);
      setTimeout(() => {
        if (revealIndex < players.length - 1) setRevealIndex(revealIndex + 1);
        else transition(() => { setScreen("game"); startDescribePhase(); });
      }, 200);
    } else setWordVisible(true);
  };

  const startVote = () => {
    const alive = players.map((p, i) => (p.alive ? i : -1)).filter((i) => i >= 0);
    setVoteOrder(shuffle(alive));
    setVoteIndex(0);
    setVoteStep("choosing");
    setVotes({});
    setGamePhase("vote");
  };
  const castVote = (v, t) => setVotes((p) => ({ ...p, [v]: t }));

  const detectWin = (up) => {
    const uc = up.filter((p) => p.alive && p.role === "undercover").length;
    const mw = up.filter((p) => p.alive && p.role === "mrwhite").length;
    const ci = up.filter((p) => p.alive && p.role === "civil").length;
    // Civils win when all impostors are eliminated
    if (uc === 0 && mw === 0) return "civil";
    // Undercovers win when they equal or outnumber civils
    // Mr. White alone doesn't trigger the win — only undercovers count for the threshold
    if (uc >= ci && uc > 0) return "undercover";
    return null;
  };

  const applyWin = (winType, up) => {
    setWinner(winType);
    const ps = up || players;
    const s = { ...scores };
    if (winType === "civil") {
      ps.filter((p) => p.role === "civil").forEach((p) => { s[p.name] = (s[p.name] || 0) + 1; });
    } else {
      ps.filter((p) => p.role !== "civil").forEach((p) => { s[p.name] = (s[p.name] || 0) + 1; });
    }
    setScores(s);
  };

  const elim = (idx) => {
    const up = players.map((p, i) => i === idx ? { ...p, alive: false } : p);
    setPlayers(up); setEliminated((e) => [...e, idx]); return up;
  };

  // Show elimination animation then call next action
  const showElimReveal = (idx, updatedPlayers, nextAction, winType = null) => {
    setElimRevealIdx(idx);
    setElimAnimPhase(0);
    setElimWinType(winType);
    setElimRevealCallback(() => nextAction);
    transition(() => setScreen("elimreveal"));
    setTimeout(() => setElimAnimPhase(1), 1200);
    setTimeout(() => setElimAnimPhase(2), winType ? 3500 : 2800);
  };

  const resolveVote = () => {
    const alive = players.map((p, i) => (p.alive ? i : -1)).filter((i) => i >= 0);
    const tally = {}; alive.forEach((i) => { tally[i] = 0; });
    Object.values(votes).forEach((t) => { tally[t] = (tally[t] || 0) + 1; });
    const mx = Math.max(...Object.values(tally));
    const targets = Object.entries(tally).filter(([, v]) => v === mx).map(([k]) => +k);
    if (targets.length === 1) {
      const up = elim(targets[0]);
      const winType = detectWin(up);
      showElimReveal(targets[0], up, () => {
        if (winType) {
          applyWin(winType, up);
          transition(() => setScreen("results"));
        } else {
          setSuddenDeathCount(0); setScreen("game"); startDescribePhase(up); setVotes({});
        }
      }, winType);
    } else {
      const sdOrder = speakingOrder.filter((i) => targets.includes(i));
      setTiedPlayers(targets); setSuddenDeathCount(1);
      setSuddenDeathVotes({}); setRandomElimMessage("");
      setSdSpeakingOrder(sdOrder.length > 0 ? sdOrder : targets);
      setSdSpeakingIndex(0); setSdAllSpoken(false);
      setTieMessage(`Égalité entre ${targets.map((i) => players[i].name).join(", ")} !`);
      transition(() => setScreen("suddendeath"));
    }
  };

  const castSdVote = (v, t) => setSuddenDeathVotes((p) => ({ ...p, [v]: t }));

  const resolveSd = () => {
    const tally = {}; tiedPlayers.forEach((i) => { tally[i] = 0; });
    Object.values(suddenDeathVotes).forEach((t) => { if (tally[t] !== undefined) tally[t]++; });
    const mx = Math.max(...Object.values(tally));
    const targets = Object.entries(tally).filter(([, v]) => v === mx).map(([k]) => +k);
    if (targets.length === 1) {
      const up = elim(targets[0]);
      const winType = detectWin(up);
      showElimReveal(targets[0], up, () => {
        if (winType) {
          applyWin(winType, up);
          transition(() => setScreen("results"));
        } else {
          setSuddenDeathCount(0); setTiedPlayers([]);
          setScreen("game"); startDescribePhase(up); setVotes({});
        }
      }, winType);
    } else if (suddenDeathCount >= MAX_SUDDEN_DEATH) {
      const ri = pickRandom(targets);
      const up = elim(ri);
      const winType = detectWin(up);
      setRandomElimMessage(`Le sort a choisi... ${players[ri].name} !`);
      setTimeout(() => {
        setRandomElimMessage("");
        showElimReveal(ri, up, () => {
          if (winType) {
            applyWin(winType, up);
            transition(() => setScreen("results"));
          } else {
            setSuddenDeathCount(0); setTiedPlayers([]);
            setScreen("game"); startDescribePhase(up); setVotes({});
          }
        }, winType);
      }, 2500);
    } else {
      const sdOrder = speakingOrder.filter((i) => targets.includes(i));
      setTiedPlayers(targets); setSuddenDeathCount((c) => c + 1);
      setSuddenDeathVotes({});
      setSdSpeakingOrder(sdOrder.length > 0 ? sdOrder : targets);
      setSdSpeakingIndex(0); setSdAllSpoken(false);
      setTieMessage(`Toujours à égalité ! Mort subite ${suddenDeathCount + 1}/${MAX_SUDDEN_DEATH}`);
    }
  };

  const newRound = () => { setRound((r) => r + 1); transition(() => setScreen("setup")); };

  // Quick mode: user taps the player to eliminate directly (no in-app vote).
  // Used for both the main vote phase and sudden-death phase when quickVote is enabled.
  const quickEliminate = (idx) => {
    const up = elim(idx);
    const winType = detectWin(up);
    showElimReveal(idx, up, () => {
      if (winType) {
        applyWin(winType, up);
        transition(() => setScreen("results"));
      } else {
        setSuddenDeathCount(0); setTiedPlayers([]);
        setScreen("game"); startDescribePhase(up); setVotes({});
      }
    }, winType);
  };

  const getAlive = () => players.map((p, i) => ({ ...p, idx: i })).filter((p) => p.alive);
  const lastElim = eliminated.length > 0 ? players[eliminated[eliminated.length - 1]] : null;

  const cs = {
    minHeight: "100vh", background: "var(--bg)", color: "var(--text)", fontFamily: "var(--font)",
    display: "flex", flexDirection: "column", alignItems: "center", padding: "20px 16px",
    opacity: fadeIn ? 1 : 0, transition: "opacity .3s ease", overflowX: "hidden",
  };

  // ─────────────────────────────────────────────────────
  // ─── NETWORKING (PeerJS) ─────────────────────────────
  // ─────────────────────────────────────────────────────

  // Sync refs
  useEffect(() => { isHostRef.current = isHost; }, [isHost]);
  useEffect(() => { myPlayerIdRef.current = myPlayerId; }, [myPlayerId]);
  useEffect(() => { myPseudoRef.current = myPseudo; }, [myPseudo]);
  useEffect(() => { myEmojiRef.current = myEmoji; }, [myEmoji]);
  useEffect(() => { myPhotoRef.current = myPhoto; }, [myPhoto]);
  useEffect(() => { lobbyPlayersRef.current = lobbyPlayers; }, [lobbyPlayers]);
  useEffect(() => { slotsCountRef.current = slotsCount; }, [slotsCount]);

  // Build the canonical lobby payload (host first, then connected joiners)
  const buildLobbyPayload = () => ({
    type: "lobby",
    players: [
      { playerId: myPlayerIdRef.current, name: myPseudoRef.current, emoji: myEmojiRef.current, photo: myPhotoRef.current, connected: true },
      ...lobbyPlayersRef.current.filter((p) => p.connected !== false),
    ],
    slotsCount: slotsCountRef.current,
  });

  // Detect URL ?room=CODE on first load
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const r = params.get("room");
      if (r && /^[A-Z0-9]+$/.test(r) && r.length <= 8) {
        setJoinCode(r.toUpperCase());
      }
    } catch (e) {}
  }, []);

  // Wake lock acquire / release based on screen
  useEffect(() => {
    const inGame = ["reveal", "game", "suddendeath", "elimreveal"].includes(screen);
    const acquire = async () => {
      try {
        if ("wakeLock" in navigator && !wakeLockRef.current) {
          wakeLockRef.current = await navigator.wakeLock.request("screen");
        }
      } catch (e) {}
    };
    const release = () => {
      try { wakeLockRef.current && wakeLockRef.current.release && wakeLockRef.current.release(); } catch (e) {}
      wakeLockRef.current = null;
    };
    if (inGame) acquire(); else release();
    return release;
  }, [screen]);

  // Cleanup on unmount
  useEffect(() => {
    return () => {
      try { peerRef.current && peerRef.current.destroy && peerRef.current.destroy(); } catch (e) {}
      peerRef.current = null;
    };
  }, []);

  // ─── Auto-reconnect on app foreground (iOS PWA suspends the app + drops WebRTC) ───
  // When the user comes back to the app, if the connection to the host is dead, try to reconnect.
  // The host side cannot easily recover (the PeerJS broker still considers the old peer registered for ~30-60s),
  // so we only handle clients here. For the host, we try to reconnect the peer too if it's been disconnected.
  useEffect(() => {
    const tryReconnect = () => {
      if (document.hidden) return;
      if (playMode !== "multi") return;
      if (!roomCode) return;
      // Don't try to reconnect during fluid transitions
      if (!["multi_lobby", "reveal", "game", "suddendeath", "elimreveal", "results"].includes(screen)) return;

      if (!isHostRef.current) {
        // Client: check the conn to host
        const conn = hostConnRef.current;
        const peerOk = peerRef.current && !peerRef.current.destroyed && !peerRef.current.disconnected;
        const connOk = conn && conn.open;
        if (!peerOk || !connOk) {
          setNetworkError("Reconnexion en cours…");
          // Destroy old peer
          try { peerRef.current && peerRef.current.destroy(); } catch (e) {}
          peerRef.current = null;
          hostConnRef.current = null;
          // Re-join (preserves playerId via localStorage)
          setTimeout(() => {
            joinRoom(roomCode, myPseudo, myEmoji, myPhoto, () => {
              setNetworkError("");
            });
          }, 300);
        }
      } else {
        // Host: if peer is disconnected, try peer.reconnect() first
        if (peerRef.current && peerRef.current.disconnected && !peerRef.current.destroyed) {
          try {
            peerRef.current.reconnect();
            setNetworkError("Reconnexion au serveur…");
            setTimeout(() => setNetworkError(""), 3000);
          } catch (e) {
            console.error("host reconnect failed", e);
          }
        }
      }
    };

    const onVis = () => { if (!document.hidden) tryReconnect(); };
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("focus", onVis);
    window.addEventListener("online", onVis);
    return () => {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("focus", onVis);
      window.removeEventListener("online", onVis);
    };
  }, [playMode, roomCode, myPseudo, myEmoji, myPhoto, screen]);

  // Send a single message to a specific connection (host -> one client)
  const sendToConn = (conn, msg) => {
    try { if (conn && conn.open) conn.send(msg); } catch (e) { console.error("send fail", e); }
  };

  // Host: send to all connected clients
  const broadcast = (msg) => {
    connsRef.current.forEach((c) => sendToConn(c, msg));
  };

  // Client: send to host
  const sendToHost = (msg) => {
    sendToConn(hostConnRef.current, msg);
  };

  // Build a state snapshot for clients
  const buildSnapshot = (overrides = {}) => ({
    type: "state",
    payload: {
      screen, gamePhase, round,
      speakingOrder, speakingIndex, allSpoken,
      voteOrder,
      eliminated,
      tiedPlayers, suddenDeathCount, tieMessage, randomElimMessage,
      sdSpeakingOrder, sdSpeakingIndex, sdAllSpoken,
      sdVoteOrder,
      elimRevealIdx, elimAnimPhase, elimWinType,
      winner, scores,
      timerEnabled, timerSeconds,
      voteCounts: { done: Object.keys(votes).length, total: voteOrder.length },
      sdVoteCounts: { done: Object.keys(suddenDeathVotes).length, total: sdVoteOrder.length },
      voteCountdown,
      players: sanitizePlayersForBroadcast(players, !!winner),
      hostPlayerId,
      ...overrides,
    },
  });

  // Hold a stable broadcast snapshot fn ref
  useEffect(() => { broadcastRef.current = () => broadcast(buildSnapshot()); });

  // Keep handler refs pointing to the latest version (avoid stale closures in PeerJS callbacks)
  useEffect(() => { onHostReceiveRef.current = onHostReceive; });
  useEffect(() => { onHostClientDisconnectRef.current = onHostClientDisconnect; });
  useEffect(() => { onClientReceiveRef.current = onClientReceive; });
  useEffect(() => { onHostDisconnectRef.current = onHostDisconnect; });

  // HOST: create room
  const createRoom = (cb) => {
    setNetworkError("");
    if (typeof Peer === "undefined") {
      setNetworkError("PeerJS non chargé. Vérifiez votre connexion.");
      return;
    }
    const code = generateRoomCode();
    const myId = generatePlayerId();
    setMyPlayerId(myId);
    setHostPlayerId(myId);
    setRoomCode(code);
    setIsHost(true);
    setPlayMode("multi");
    isHostRef.current = true;
    myPlayerIdRef.current = myId;

    const peer = new Peer(ROOM_PREFIX + code);
    peerRef.current = peer;

    peer.on("open", () => { if (cb) cb(); });
    peer.on("error", (err) => {
      console.error("Peer error", err);
      if (err.type === "unavailable-id") {
        setNetworkError("Code de room déjà pris. Réessaye.");
      } else if (err.type === "network" || err.type === "server-error") {
        setNetworkError("Erreur réseau. Vérifie ta connexion.");
      } else {
        setNetworkError("Erreur PeerJS: " + err.type);
      }
    });
    peer.on("connection", (conn) => {
      // Attach data handler IMMEDIATELY (before open) to avoid race where
      // client sends "join" the moment its conn opens, before host attached its listener.
      // Use refs so the handlers always run against the latest state (no stale closures).
      conn.on("data", (msg) => onHostReceiveRef.current && onHostReceiveRef.current(conn, msg));
      conn.on("close", () => onHostClientDisconnectRef.current && onHostClientDisconnectRef.current(conn));
      conn.on("error", () => onHostClientDisconnectRef.current && onHostClientDisconnectRef.current(conn));
    });
  };

  // CLIENT: join a room
  const joinRoom = (code, pseudo, emoji, photo, cb) => {
    setNetworkError("");
    if (typeof Peer === "undefined") {
      setNetworkError("PeerJS non chargé. Vérifiez votre connexion.");
      return;
    }
    code = (code || "").toUpperCase().trim();
    if (!/^[A-Z2-9]{6}$/.test(code)) {
      setNetworkError("Code invalide (6 caractères).");
      return;
    }
    // Reuse stored APPLICATION playerId for this room if any (used for slot reattachment).
    // The NETWORK peer id is generated fresh each time so reconnects don't clash with the
    // previous (possibly still-registered) peer on the broker.
    let storedId = "";
    try {
      const k = "wundercover_pid_" + code;
      storedId = localStorage.getItem(k) || "";
    } catch (e) {}
    const myId = storedId || generatePlayerId();
    try { localStorage.setItem("wundercover_pid_" + code, myId); } catch (e) {}
    setMyPlayerId(myId);
    setRoomCode(code);
    setIsHost(false);
    setPlayMode("multi");
    setMyPseudo(pseudo);
    setMyEmoji(emoji);
    setMyPhoto(photo);
    isHostRef.current = false;
    myPlayerIdRef.current = myId;

    // Random network peer id (no custom ID) to avoid collisions on reconnect
    const peer = new Peer();
    peerRef.current = peer;

    peer.on("open", () => {
      const conn = peer.connect(ROOM_PREFIX + code, { reliable: true });
      hostConnRef.current = conn;
      conn.on("open", () => {
        conn.send({ type: "join", playerId: myId, pseudo, emoji, photo });
        if (cb) cb();
      });
      conn.on("data", (msg) => onClientReceiveRef.current && onClientReceiveRef.current(msg));
      conn.on("close", () => onHostDisconnectRef.current && onHostDisconnectRef.current());
      conn.on("error", () => onHostDisconnectRef.current && onHostDisconnectRef.current());
    });
    peer.on("error", (err) => {
      console.error("Peer error", err);
      if (err.type === "peer-unavailable") {
        setNetworkError("Room introuvable. Vérifie le code.");
      } else if (err.type === "network") {
        setNetworkError("Erreur réseau.");
      } else {
        setNetworkError("Erreur: " + err.type);
      }
    });
  };

  // Leave room cleanly
  const leaveRoom = () => {
    try {
      if (isHostRef.current) {
        broadcast({ type: "host_left" });
      } else {
        sendToHost({ type: "leave", playerId: myPlayerIdRef.current });
      }
    } catch (e) {}
    try { peerRef.current && peerRef.current.destroy(); } catch (e) {}
    peerRef.current = null;
    connsRef.current = new Map();
    hostConnRef.current = null;
    setIsHost(false);
    setPlayMode("solo");
    setRoomCode("");
    setLobbyPlayers([]);
    setMySlotIdx(-1);
    setMyWord(null);
    setMyRole(null);
    setNetworkError("");
    isHostRef.current = false;
  };

  // ─── HOST RECEIVE ───
  const onHostReceive = (conn, msg) => {
    if (!msg || typeof msg !== "object") return;
    switch (msg.type) {
      case "join": {
        // Add or reattach player
        let added = false;
        setLobbyPlayers((prev) => {
          const idx = prev.findIndex((p) => p.playerId === msg.playerId);
          let next;
          if (idx >= 0) {
            next = [...prev];
            next[idx] = { ...next[idx], name: msg.pseudo, emoji: msg.emoji, photo: msg.photo, connected: true };
          } else {
            // Capacity check (host counts as 1)
            const totalConnected = prev.filter((p) => p.connected !== false).length + 1;
            if (totalConnected >= slotsCountRef.current) {
              sendToConn(conn, { type: "error", message: "Room pleine." });
              try { conn.close(); } catch (e) {}
              return prev;
            }
            next = [...prev, { playerId: msg.playerId, name: msg.pseudo, emoji: msg.emoji, photo: msg.photo, connected: true }];
            added = true;
          }
          // Update ref synchronously so buildLobbyPayload sees fresh data
          lobbyPlayersRef.current = next;
          return next;
        });
        // Track connection
        connsRef.current.set(msg.playerId, conn);

        // Welcome the joiner
        sendToConn(conn, { type: "welcome", playerId: msg.playerId, hostPlayerId: myPlayerIdRef.current });

        // Send the full lobby IMMEDIATELY to everyone (incl. the new joiner so they see existing players)
        const payload = buildLobbyPayload();
        sendToConn(conn, payload);
        // Also broadcast to all other clients so they see the new joiner
        connsRef.current.forEach((c, pid) => {
          if (pid !== msg.playerId) sendToConn(c, payload);
        });

        // If we are mid-game and this player has a slot, restore their private data
        const slot = players.findIndex((p) => p.playerId === msg.playerId);
        if (slot >= 0 && players[slot]) {
          sendToConn(conn, { type: "your_role", word: players[slot].word, role: players[slot].role, slotIdx: slot });
          // Mark as connected
          setPlayers((prev) => prev.map((p, i) => i === slot ? { ...p, connected: true } : p));
        }
        // Send snapshot ONLY if a game is in progress (not in lobby).
        // During lobby, the "lobby" message is enough — sending a snapshot would overwrite
        // lobbyPlayers with an empty list because game `players` array is still empty.
        if (screen !== "multi_lobby" && players.length > 0) {
          setTimeout(() => sendToConn(conn, buildSnapshot()), 60);
        }
        break;
      }
      case "leave": {
        // Treat like disconnect
        onHostClientDisconnect(conn);
        break;
      }
      case "next_speaker": {
        // Only the current speaker may advance (or host)
        const curIdx = speakingOrder[speakingIndex];
        if (msg.playerId === players[curIdx]?.playerId || msg.playerId === myPlayerIdRef.current) {
          if (speakingIndex < speakingOrder.length - 1) setSpeakingIndex(speakingIndex + 1);
          else setAllSpoken(true);
        }
        break;
      }
      case "next_sd_speaker": {
        const curIdx = sdSpeakingOrder[sdSpeakingIndex];
        if (msg.playerId === players[curIdx]?.playerId || msg.playerId === myPlayerIdRef.current) {
          if (sdSpeakingIndex < sdSpeakingOrder.length - 1) setSdSpeakingIndex(sdSpeakingIndex + 1);
          else {
            const aliveIdx = players.map((p, i) => (p.alive ? i : -1)).filter((i) => i >= 0);
            setSdVoteOrder(shuffle(aliveIdx));
            setSdAllSpoken(true);
          }
        }
        break;
      }
      case "cast_vote": {
        // msg.playerId, msg.targetIdx
        const voterIdx = players.findIndex((p) => p.playerId === msg.playerId);
        if (voterIdx < 0 || !players[voterIdx].alive) break;
        if (votes[voterIdx] !== undefined) break; // already voted
        setVotes((p) => ({ ...p, [voterIdx]: msg.targetIdx }));
        break;
      }
      case "cast_sd_vote": {
        const voterIdx = players.findIndex((p) => p.playerId === msg.playerId);
        if (voterIdx < 0 || !players[voterIdx].alive) break;
        if (suddenDeathVotes[voterIdx] !== undefined) break;
        setSuddenDeathVotes((p) => ({ ...p, [voterIdx]: msg.targetIdx }));
        break;
      }
      default: break;
    }
  };

  // ─── HOST: client disconnected ───
  const onHostClientDisconnect = (conn) => {
    // Find the player linked to this connection
    let disconnectedId = null;
    connsRef.current.forEach((c, pid) => { if (c === conn) disconnectedId = pid; });
    if (!disconnectedId) return;
    connsRef.current.delete(disconnectedId);
    setLobbyPlayers((prev) => {
      let next;
      // If game not started, remove from lobby. If started, mark as disconnected.
      if (players.length > 0) {
        next = prev.map((p) => p.playerId === disconnectedId ? { ...p, connected: false } : p);
      } else {
        next = prev.filter((p) => p.playerId !== disconnectedId);
      }
      lobbyPlayersRef.current = next;
      // Broadcast updated lobby to remaining clients
      const payload = {
        type: "lobby",
        players: [
          { playerId: myPlayerIdRef.current, name: myPseudoRef.current, emoji: myEmojiRef.current, photo: myPhotoRef.current, connected: true },
          ...next.filter((p) => p.connected !== false),
        ],
        slotsCount: slotsCountRef.current,
      };
      connsRef.current.forEach((c) => sendToConn(c, payload));
      return next;
    });
    setPlayers((prev) => prev.map((p) => p.playerId === disconnectedId ? { ...p, connected: false } : p));
  };

  // ─── CLIENT: receive from host ───
  const onClientReceive = (msg) => {
    if (!msg || typeof msg !== "object") return;
    switch (msg.type) {
      case "welcome": {
        setHostPlayerId(msg.hostPlayerId);
        break;
      }
      case "lobby": {
        setLobbyPlayers(msg.players || []);
        setSlotsCount(msg.slotsCount || 5);
        break;
      }
      case "your_role": {
        setMyWord(msg.word);
        setMyRole(msg.role);
        setMySlotIdx(msg.slotIdx);
        setWordVisible(false); // Reset reveal state for the new round
        break;
      }
      case "state": {
        const s = msg.payload;
        // Apply remote state to client's local state
        setScreen(s.screen);
        setGamePhase(s.gamePhase);
        setRound(s.round);
        setSpeakingOrder(s.speakingOrder);
        setSpeakingIndex(s.speakingIndex);
        setAllSpoken(s.allSpoken);
        setVoteOrder(s.voteOrder);
        setEliminated(s.eliminated);
        setTiedPlayers(s.tiedPlayers);
        setSuddenDeathCount(s.suddenDeathCount);
        setTieMessage(s.tieMessage);
        setRandomElimMessage(s.randomElimMessage);
        setSdSpeakingOrder(s.sdSpeakingOrder);
        setSdSpeakingIndex(s.sdSpeakingIndex);
        setSdAllSpoken(s.sdAllSpoken);
        setSdVoteOrder(s.sdVoteOrder);
        setElimRevealIdx(s.elimRevealIdx);
        setElimAnimPhase(s.elimAnimPhase);
        setElimWinType(s.elimWinType);
        setWinner(s.winner);
        setScores(s.scores);
        setTimerEnabled(s.timerEnabled);
        setTimerSeconds(s.timerSeconds);
        setVoteCounts(s.voteCounts || { done: 0, total: 0 });
        setSdVoteCounts(s.sdVoteCounts || { done: 0, total: 0 });
        setVoteCountdown(s.voteCountdown || 0);
        // NOTE: We deliberately do NOT update lobbyPlayers from the state snapshot.
        // The lobby is managed exclusively by the "lobby" messages — a state snapshot
        // during lobby phase would have an empty players array and would wipe the lobby.
        // Update our own players array (with sanitized info) — only when game has started
        if (s.players && s.players.length > 0) {
          setPlayers(s.players.map((p) => ({
            playerId: p.playerId, name: p.name, emoji: p.emoji, photo: p.photo,
            alive: p.alive, role: p.role, word: p.word, connected: p.connected,
          })));
          // Find own slot
          const idx = s.players.findIndex((p) => p.playerId === myPlayerIdRef.current);
          if (idx >= 0) setMySlotIdx(idx);
        }
        // Reset vote state when entering a fresh vote phase
        if (s.gamePhase === "describe") { setIVoted(false); setISdVoted(false); }
        break;
      }
      case "host_left": {
        setNetworkError("L'hôte a quitté la partie.");
        leaveRoom();
        transition(() => setScreen("home"));
        break;
      }
      case "host_ended_game": {
        // Host manually ended the game — bring everyone back to the lobby
        setPlayers([]);
        setMySlotIdx(-1); setMyWord(null); setMyRole(null);
        setEliminated([]); setVotes({}); setSuddenDeathVotes({}); setWinner(null);
        setVoteCountdown(0); setIVoted(false); setISdVoted(false);
        setTiedPlayers([]); setSuddenDeathCount(0);
        setNetworkError("L'hôte a mis fin à la partie.");
        transition(() => setScreen("multi_lobby"));
        // Clear the notif after a few seconds
        setTimeout(() => setNetworkError(""), 4000);
        break;
      }
      case "kicked": {
        setNetworkError("Tu as été retiré de la partie.");
        leaveRoom();
        transition(() => setScreen("home"));
        break;
      }
      case "error": {
        setNetworkError(msg.message || "Erreur.");
        break;
      }
      default: break;
    }
  };

  const onHostDisconnect = () => {
    setNetworkError("Connexion à l'hôte perdue.");
    // Don't auto-leave, allow user to retry
  };

  // ─── HOST-ONLY: end game manually (e.g., a player left and is blocking) ───
  const endGameMulti = () => {
    if (!isHost) return;
    // Notify everyone the host is ending it
    broadcast({ type: "host_ended_game" });
    // Reset host's own state and go back to lobby
    setPlayers([]);
    setMySlotIdx(-1); setMyWord(null); setMyRole(null);
    setEliminated([]); setVotes({}); setSuddenDeathVotes({}); setWinner(null);
    setVoteCountdown(0); setIVoted(false); setISdVoted(false);
    setTiedPlayers([]); setSuddenDeathCount(0); setTieMessage(""); setRandomElimMessage("");
    setSdAllSpoken(false); setAllSpoken(false);
    setSpeakingOrder([]); setSpeakingIndex(0); setSdSpeakingOrder([]); setSdSpeakingIndex(0);
    // Rebuild lobbyPlayers from currently-connected non-host players
    const stillConnected = (lobbyPlayersRef.current || []).filter(p => p.connected !== false);
    setLobbyPlayers(stillConnected);
    lobbyPlayersRef.current = stillConnected;
    transition(() => setScreen("multi_lobby"));
  };

  // ─── HOST-ONLY: force advance the speaking turn (e.g., speaker disconnected) ───
  const hostForceAdvanceSpeaker = () => {
    if (!isHost) return;
    if (speakingIndex < speakingOrder.length - 1) setSpeakingIndex(speakingIndex + 1);
    else setAllSpoken(true);
  };
  const hostForceAdvanceSdSpeaker = () => {
    if (!isHost) return;
    if (sdSpeakingIndex < sdSpeakingOrder.length - 1) setSdSpeakingIndex(sdSpeakingIndex + 1);
    else {
      const aliveIdx = players.map((p, i) => (p.alive ? i : -1)).filter((i) => i >= 0);
      setSdVoteOrder(shuffle(aliveIdx));
      setSdVoteIndex(0);
      setSdVoteStep("choosing");
      setSdAllSpoken(true);
    }
  };

  // ─── HOST: lobby broadcast ───
  // Broadcast lobby on slotsCount or host identity change while in lobby
  // (Joins are broadcast directly in onHostReceive case "join" for lower latency.)
  useEffect(() => {
    if (!isHost || !peerRef.current) return;
    if (screen !== "multi_lobby") return;
    broadcast(buildLobbyPayload());
  }, [lobbyPlayers, slotsCount, screen, isHost, myPseudo, myEmoji, myPhoto]);

  // ─── HOST: broadcast state on game state changes ───
  useEffect(() => {
    if (!isHost || !peerRef.current) return;
    if (!["reveal", "game", "suddendeath", "elimreveal", "results"].includes(screen)) return;
    broadcast(buildSnapshot());
  }, [
    screen, gamePhase, round,
    speakingIndex, allSpoken,
    JSON.stringify(speakingOrder),
    eliminated.length,
    JSON.stringify(players.map((p) => [p.alive, p.connected !== false ? 1 : 0])),
    tiedPlayers.length, suddenDeathCount, tieMessage, randomElimMessage,
    sdSpeakingIndex, sdAllSpoken,
    JSON.stringify(sdSpeakingOrder),
    elimRevealIdx, elimAnimPhase, elimWinType,
    winner,
    Object.keys(votes).length,
    JSON.stringify(voteOrder),
    Object.keys(suddenDeathVotes).length,
    JSON.stringify(sdVoteOrder),
    voteCountdown,
    isHost,
  ]);

  // ─── HOST: auto-resolve when all votes are in ───
  useEffect(() => {
    if (!isHost || playMode !== "multi") return;
    if (screen !== "game" || gamePhase !== "vote") return;
    if (voteOrder.length === 0) return;
    if (Object.keys(votes).length < voteOrder.length) return;
    if (voteCountdown > 0) return;
    setVoteCountdown(3);
  }, [votes, voteOrder, gamePhase, screen, isHost, playMode]);

  useEffect(() => {
    if (!isHost || playMode !== "multi") return;
    if (voteCountdown <= 0) return;
    const t = setTimeout(() => {
      if (voteCountdown === 1) {
        setVoteCountdown(0);
        if (screen === "suddendeath") resolveSd();
        else if (gamePhase === "vote") resolveVote();
      } else {
        setVoteCountdown((c) => c - 1);
      }
    }, 1000);
    return () => clearTimeout(t);
  }, [voteCountdown, isHost, playMode, gamePhase, screen]);

  useEffect(() => {
    if (!isHost || playMode !== "multi") return;
    if (screen !== "suddendeath" || !sdAllSpoken) return;
    if (sdVoteOrder.length === 0) return;
    if (Object.keys(suddenDeathVotes).length < sdVoteOrder.length) return;
    if (voteCountdown > 0) return;
    setVoteCountdown(3);
  }, [suddenDeathVotes, sdVoteOrder, sdAllSpoken, screen, isHost, playMode]);

  // ─────────────────────────────────────────────────────

  // ═══════════ HOME ═══════════
  if (screen === "home") return (
    <div style={cs}><style>{cssVars}</style>
      <div style={{ textAlign: "center", marginTop: 40 }}>
        <div style={{ fontSize: 64, marginBottom: 8 }}>🕵️</div>
        <h1 style={{ fontFamily: "var(--font-display)", fontSize: "clamp(36px,8vw,56px)", fontWeight: 900, letterSpacing: -1, lineHeight: 1.1, background: "linear-gradient(135deg, var(--accent), var(--accent2))", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>UNDERCOVER</h1>
        <p style={{ color: "var(--text2)", fontSize: 15, marginTop: 8, maxWidth: 300, margin: "8px auto 0" }}>Bluffez, déduisez, éliminez. Qui est l'imposteur ?</p>
      </div>
      <div style={{ marginTop: 40, display: "flex", flexDirection: "column", gap: 12, width: "100%", maxWidth: 340 }}>
        <button onClick={() => { setPlayMode("solo"); transition(() => setScreen("setup")); }} style={btnPrimaryConst}>
          📱 Solo <span style={{ fontWeight: 400, fontSize: 13, opacity: .8 }}>— 1 téléphone</span>
        </button>
        <button onClick={() => transition(() => setScreen("multi_choose"))} style={{ ...btnPrimaryConst, background: "linear-gradient(135deg, #2EC4B6, #7B2FF7)" }}>
          🌐 Multi <span style={{ fontWeight: 400, fontSize: 13, opacity: .8 }}>— chacun son tel</span>
        </button>
        {joinCode && (
          <div style={{ background: "#7B2FF722", border: "1px solid #7B2FF755", borderRadius: 12, padding: "10px 14px", fontSize: 12, color: "var(--text2)", textAlign: "center" }}>
            Code détecté dans l'URL : <strong style={{ color: "#A855F7", fontFamily: "var(--font-mono)" }}>{joinCode}</strong>
          </div>
        )}
        {Object.keys(scores).length > 0 && (
          <div style={{ background: "var(--surface)", borderRadius: 16, padding: 20, border: "1px solid var(--border)", marginTop: 16 }}>
            <h3 style={{ fontSize: 14, color: "var(--text2)", marginBottom: 12, fontWeight: 600 }}>🏆 Scores</h3>
            {Object.entries(scores).sort(([,a],[,b]) => b - a).map(([n, s]) => (
              <div key={n} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid var(--border)" }}>
                <span style={{ fontSize: 14 }}>{n}</span>
                <span style={{ fontFamily: "var(--font-mono)", fontWeight: 700, color: "var(--accent)" }}>{s}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      <p style={{ position: "fixed", bottom: 16, fontSize: 11, color: "var(--text3)" }}>Manche {round}</p>
    </div>
  );

  // ═══════════ MULTI: Choose Create or Join ═══════════
  if (screen === "multi_choose") return (
    <div style={cs}><style>{cssVars}</style>
      <button onClick={() => transition(() => setScreen("home"))} style={btnBack}>← Retour</button>
      <div style={{ textAlign: "center", marginBottom: 32, marginTop: 20 }}>
        <div style={{ fontSize: 56, marginBottom: 8 }}>🌐</div>
        <h2 style={sectionTitle}>Mode Multi</h2>
        <p style={{ color: "var(--text2)", fontSize: 13, maxWidth: 320, margin: "8px auto 0" }}>Chaque joueur sur son téléphone, partie synchronisée en P2P.</p>
      </div>
      {networkError && (
        <div style={{ background: "#E6394622", border: "1px solid #E6394666", borderRadius: 12, padding: "10px 14px", fontSize: 13, color: "#E63946", marginBottom: 16, maxWidth: 340, width: "100%", textAlign: "center" }}>
          {networkError}
        </div>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 12, width: "100%", maxWidth: 340 }}>
        <button onClick={() => transition(() => setScreen("multi_host_setup"))} style={btnPrimaryConst}>
          🎯 Créer une partie
        </button>
        <button onClick={() => transition(() => setScreen("multi_join_setup"))} style={{ ...btnPrimaryConst, background: "linear-gradient(135deg, #2EC4B6, #1E90FF)" }}>
          🔗 Rejoindre une partie
        </button>
      </div>
      <div style={{ marginTop: 40, padding: "12px 16px", background: "var(--surface2)", borderRadius: 12, fontSize: 11, color: "var(--text3)", maxWidth: 340, lineHeight: 1.5, textAlign: "center" }}>
        ℹ️ L'hôte garde l'app ouverte pendant toute la partie. Si l'hôte se déconnecte, la partie se termine.
      </div>
    </div>
  );

  // ═══════════ MULTI: Host setup ═══════════
  if (screen === "multi_host_setup") {
    const canCreate = myPseudo.trim().length >= 1 && slotsCount >= 3 && slotsCount <= 12;
    return (
      <div style={cs}><style>{cssVars}</style>
        {cameraOpenFor === "self" && (
          <CameraModal
            onCapture={(url) => { setMyPhoto(url); setCameraOpenFor(null); }}
            onClose={() => setCameraOpenFor(null)}
          />
        )}
        <button onClick={() => transition(() => setScreen("multi_choose"))} style={btnBack}>← Retour</button>
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 48, marginBottom: 4 }}>🎯</div>
          <h2 style={sectionTitle}>Créer une partie</h2>
        </div>
        {networkError && (
          <div style={{ background: "#E6394622", border: "1px solid #E6394666", borderRadius: 12, padding: "10px 14px", fontSize: 13, color: "#E63946", marginBottom: 12, maxWidth: 360, width: "100%", textAlign: "center" }}>
            {networkError}
          </div>
        )}
        <div style={{ width: "100%", maxWidth: 360, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={card}>
            <label style={labelStyle}>Ton identité</label>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 10 }}>
              <EmojiPicker value={myEmoji} photo={myPhoto} onSelect={setMyEmoji} onPhoto={() => setCameraOpenFor("self")} />
              <input value={myPseudo} onChange={(e) => setMyPseudo(e.target.value.slice(0, 20))} placeholder="Ton pseudo" style={{ ...inputStyle, flex: 1 }} />
            </div>
          </div>
          <div style={card}>
            <label style={labelStyle}>Nombre de joueurs</label>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16, marginTop: 12 }}>
              <button onClick={() => setSlotsCount(Math.max(3, slotsCount - 1))} style={btnSmall}>−</button>
              <div style={{ fontSize: 36, fontWeight: 900, fontFamily: "var(--font-display)", color: "var(--accent)", minWidth: 60, textAlign: "center" }}>{slotsCount}</div>
              <button onClick={() => setSlotsCount(Math.min(12, slotsCount + 1))} style={btnSmall}>+</button>
            </div>
            <p style={{ fontSize: 11, color: "var(--text3)", textAlign: "center", marginTop: 8 }}>Toi inclus</p>
          </div>
          <button onClick={() => {
            if (!canCreate) return;
            createRoom(() => transition(() => setScreen("multi_lobby")));
          }} disabled={!canCreate} style={{ ...btnPrimaryConst, opacity: canCreate ? 1 : .4, marginTop: 8 }}>
            Créer la room →
          </button>
        </div>
      </div>
    );
  }

  // ═══════════ MULTI: Join setup ═══════════
  if (screen === "multi_join_setup") {
    const canJoin = myPseudo.trim().length >= 1 && /^[A-Z2-9]{6}$/.test(joinCode.toUpperCase());
    return (
      <div style={cs}><style>{cssVars}</style>
        {cameraOpenFor === "self" && (
          <CameraModal
            onCapture={(url) => { setMyPhoto(url); setCameraOpenFor(null); }}
            onClose={() => setCameraOpenFor(null)}
          />
        )}
        <button onClick={() => transition(() => setScreen("multi_choose"))} style={btnBack}>← Retour</button>
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 48, marginBottom: 4 }}>🔗</div>
          <h2 style={sectionTitle}>Rejoindre une partie</h2>
        </div>
        {networkError && (
          <div style={{ background: "#E6394622", border: "1px solid #E6394666", borderRadius: 12, padding: "10px 14px", fontSize: 13, color: "#E63946", marginBottom: 12, maxWidth: 360, width: "100%", textAlign: "center" }}>
            {networkError}
          </div>
        )}
        <div style={{ width: "100%", maxWidth: 360, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={card}>
            <label style={labelStyle}>Code de la room</label>
            <input
              value={joinCode}
              onChange={(e) => setJoinCode(e.target.value.toUpperCase().replace(/[^A-Z2-9]/g, "").slice(0, 6))}
              placeholder="ABC234"
              maxLength={6}
              autoCapitalize="characters"
              autoCorrect="off"
              spellCheck={false}
              style={{ ...inputStyle, textAlign: "center", fontFamily: "var(--font-mono)", fontSize: 24, letterSpacing: 6, fontWeight: 700, marginTop: 8 }}
            />
          </div>
          <div style={card}>
            <label style={labelStyle}>Ton identité</label>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 10 }}>
              <EmojiPicker value={myEmoji} photo={myPhoto} onSelect={setMyEmoji} onPhoto={() => setCameraOpenFor("self")} />
              <input value={myPseudo} onChange={(e) => setMyPseudo(e.target.value.slice(0, 20))} placeholder="Ton pseudo" style={{ ...inputStyle, flex: 1 }} />
            </div>
          </div>
          <button onClick={() => {
            if (!canJoin) return;
            joinRoom(joinCode.toUpperCase(), myPseudo.trim(), myEmoji, myPhoto, () => transition(() => setScreen("multi_lobby")));
          }} disabled={!canJoin} style={{ ...btnPrimaryConst, opacity: canJoin ? 1 : .4, marginTop: 8, background: "linear-gradient(135deg, #2EC4B6, #1E90FF)" }}>
            Rejoindre →
          </button>
        </div>
      </div>
    );
  }

  // ═══════════ MULTI: Lobby ═══════════
  if (screen === "multi_lobby") {
    // Compute "everyone" list — for host: self + connected lobbyPlayers
    const allInLobby = isHost
      ? [{ playerId: myPlayerId, name: myPseudo, emoji: myEmoji, photo: myPhoto, connected: true }, ...lobbyPlayers.filter(p => p.connected !== false)]
      : (lobbyPlayers || []);
    const filledCount = allInLobby.length;
    const slotsTotal = isHost ? slotsCount : (lobbyPlayers.length > 0 ? slotsCount : slotsCount);
    const everyoneHere = filledCount >= slotsTotal;
    const shareUrl = (() => {
      try {
        const u = new URL(window.location.href);
        u.searchParams.set("room", roomCode);
        u.hash = "";
        return u.toString();
      } catch (e) { return roomCode; }
    })();
    return (
      <div style={cs}><style>{cssVars}</style>
        <button onClick={() => { leaveRoom(); transition(() => setScreen("home")); }} style={btnBack}>← Quitter</button>
        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <div style={{ fontSize: 36, marginBottom: 4 }}>{isHost ? "🎯" : "🔗"}</div>
          <h2 style={sectionTitle}>{isHost ? "Lobby (Hôte)" : "Lobby"}</h2>
        </div>
        {networkError && (
          <div style={{ background: "#E6394622", border: "1px solid #E6394666", borderRadius: 12, padding: "10px 14px", fontSize: 13, color: "#E63946", marginBottom: 12, maxWidth: 380, width: "100%", textAlign: "center" }}>
            {networkError}
          </div>
        )}
        <div style={{ width: "100%", maxWidth: 380, display: "flex", flexDirection: "column", gap: 12 }}>
          {/* Room code + QR (host only) */}
          {isHost && (
            <div style={{ ...card, textAlign: "center" }}>
              <p style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: 2, marginBottom: 6 }}>Code de la room</p>
              <div style={{ fontFamily: "var(--font-mono)", fontSize: 36, fontWeight: 900, letterSpacing: 6, color: "var(--accent)", marginBottom: 10 }}>{roomCode}</div>
              <div style={{ marginBottom: 8 }}>
                <QRCanvas value={shareUrl} size={140} />
              </div>
              <p style={{ fontSize: 11, color: "var(--text3)", lineHeight: 1.4 }}>Partage le code ou scanne le QR pour rejoindre.</p>
            </div>
          )}
          {/* Slots list */}
          <div style={card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <label style={labelStyle}>Joueurs</label>
              <span style={{ fontSize: 12, fontFamily: "var(--font-mono)", color: everyoneHere ? "var(--accent)" : "var(--text3)" }}>{filledCount} / {slotsTotal}</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {Array.from({ length: slotsTotal }).map((_, i) => {
                const p = allInLobby[i];
                const filled = !!p;
                const isMe = filled && p.playerId === myPlayerId;
                const isHostSlot = filled && p.playerId === hostPlayerId;
                return (
                  <div key={i} style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 12,
                    background: filled ? (isMe ? "var(--accent)15" : "var(--surface2)") : "var(--surface2)",
                    border: filled ? (isMe ? "1px solid var(--accent)" : "1px solid var(--border)") : "1px dashed var(--border)",
                    opacity: filled ? 1 : .5,
                  }}>
                    {filled ? (
                      <Avatar emoji={p.emoji} photo={p.photo} size={32} style={{ border: "none" }} />
                    ) : (
                      <div style={{ width: 32, height: 32, borderRadius: "50%", background: "var(--surface)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text3)" }}>?</div>
                    )}
                    <span style={{ fontSize: 14, fontWeight: 600, color: filled ? "var(--text)" : "var(--text3)", flex: 1 }}>
                      {filled ? p.name : <em style={{ color: "var(--text3)" }}>En attente…</em>}
                    </span>
                    {isHostSlot && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 6, background: "#FFD16622", color: "#FFD166", fontWeight: 700 }}>HÔTE</span>}
                    {isMe && !isHostSlot && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 6, background: "var(--accent)22", color: "var(--accent)", fontWeight: 700 }}>TOI</span>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Game config — host only */}
          {isHost && (
            <>
              <div style={card}>
                <label style={labelStyle}>Mode</label>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 8 }}>
                  {MODES.map((m) => (
                    <button key={m.id} onClick={() => setMode(m.id)} style={{ ...chipStyleSmall, padding: "10px 12px", flexDirection: "row", justifyContent: "flex-start", gap: 10, background: mode === m.id ? "var(--accent)22" : "var(--surface2)", border: mode === m.id ? "2px solid var(--accent)" : "2px solid transparent", color: mode === m.id ? "var(--accent)" : "var(--text2)" }}>
                      <span style={{ fontSize: 18 }}>{m.icon}</span>
                      <span style={{ fontSize: 13, fontWeight: 700 }}>{m.label}</span>
                      <span style={{ fontSize: 11, color: "var(--text3)", marginLeft: "auto" }}>{m.desc}</span>
                    </button>
                  ))}
                </div>
              </div>
              {mode === "perso" && (
                <div style={card}>
                  <label style={labelStyle}>Rôles personnalisés</label>
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 12, marginTop: 8 }}>
                    <div style={{ flex: 1, padding: 8, background: "var(--surface2)", borderRadius: 10 }}>
                      <p style={{ fontSize: 11, color: "var(--text3)", marginBottom: 4 }}>Undercovers</p>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <button onClick={() => setCustomUC(Math.max(1, customUC - 1))} style={btnSmall}>−</button>
                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 18, fontWeight: 800, color: "#E63946" }}>{customUC}</span>
                        <button onClick={() => setCustomUC(Math.min(slotsCount - 1 - customMW, customUC + 1))} style={btnSmall}>+</button>
                      </div>
                    </div>
                    <div style={{ flex: 1, padding: 8, background: "var(--surface2)", borderRadius: 10 }}>
                      <p style={{ fontSize: 11, color: "var(--text3)", marginBottom: 4 }}>Mr. White</p>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <button onClick={() => setCustomMW(Math.max(0, customMW - 1))} style={btnSmall}>−</button>
                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 18, fontWeight: 800, color: "#888" }}>{customMW}</span>
                        <button onClick={() => setCustomMW(Math.min(slotsCount - 1 - customUC, customMW + 1))} style={btnSmall}>+</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
              <div style={card}>
                <label style={labelStyle}>Thème</label>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 6, marginTop: 8 }}>
                  {THEMES.map((t) => (
                    <button key={t.id} onClick={() => setTheme(t.id)} style={{ ...chipStyleSmall, background: theme === t.id ? t.color + "22" : "var(--surface2)", border: theme === t.id ? `2px solid ${t.color}` : "2px solid transparent", color: theme === t.id ? t.color : "var(--text2)" }}>
                      <span style={{ fontSize: 18 }}>{t.icon}</span><span style={{ fontSize: 10, fontWeight: 600 }}>{t.label}</span>
                    </button>
                  ))}
                </div>
              </div>
              {theme === "mix" && (
                <div style={card}><label style={labelStyle}>Mixer</label>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
                    {THEMES.filter((t) => t.id !== "mix").map((t) => (
                      <button key={t.id} onClick={() => setMixThemes((p) => p.includes(t.id) ? p.filter((x) => x !== t.id) : [...p, t.id])} style={{ ...chipStyleSmall, background: mixThemes.includes(t.id) ? t.color + "22" : "var(--surface2)", border: mixThemes.includes(t.id) ? `2px solid ${t.color}` : "2px solid transparent", color: mixThemes.includes(t.id) ? t.color : "var(--text2)" }}>
                        {t.icon} {t.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <div style={card}><label style={labelStyle}>Difficulté</label>
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  {DIFFICULTIES.map((d) => (
                    <button key={d.id} onClick={() => setDifficulty(d.id)} style={{ flex: 1, padding: "8px 4px", borderRadius: 10, cursor: "pointer", background: difficulty === d.id ? d.color + "22" : "var(--surface2)", border: difficulty === d.id ? `2px solid ${d.color}` : "2px solid transparent", color: difficulty === d.id ? d.color : "var(--text2)", fontWeight: 700, fontSize: 12 }}>
                      {d.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={card}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <label style={labelStyle}>Timer</label>
                  <button onClick={() => setTimerEnabled(!timerEnabled)} style={{ width: 48, height: 26, borderRadius: 13, border: "none", cursor: "pointer", background: timerEnabled ? "var(--accent)" : "var(--surface2)", position: "relative" }}>
                    <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: timerEnabled ? 25 : 3, transition: "left .3s" }} />
                  </button>
                </div>
                {timerEnabled && (
                  <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                    {[30,45,60,90].map((s) => (
                      <button key={s} onClick={() => setTimerSeconds(s)} style={{ flex: 1, padding: "6px 4px", borderRadius: 10, fontSize: 12, fontFamily: "var(--font-mono)", fontWeight: 700, background: timerSeconds === s ? "var(--accent)" : "var(--surface2)", color: timerSeconds === s ? "#fff" : "var(--text2)", border: "none" }}>{s}s</button>
                    ))}
                  </div>
                )}
              </div>
              <button onClick={() => {
                if (!everyoneHere) return;
                // Build players list from lobby
                const sortedLobby = [
                  { playerId: myPlayerId, name: myPseudo, emoji: myEmoji, photo: myPhoto },
                  ...lobbyPlayers.filter(p => p.connected !== false),
                ];
                // Set up the canonical playerCount/names/emojis used by startGame
                setPlayerCount(sortedLobby.length);
                setPlayerNames(sortedLobby.map(p => p.name));
                setPlayerEmojis(sortedLobby.map(p => p.emoji));
                setPlayerPhotos(sortedLobby.map(p => p.photo));
                // Defer startGame to next tick so state updates land
                setTimeout(() => startGameMulti(sortedLobby), 50);
              }} disabled={!everyoneHere} style={{ ...btnPrimaryConst, opacity: everyoneHere ? 1 : .4, marginTop: 8 }}>
                {everyoneHere ? "🚀 Lancer la partie" : `Attente ${slotsTotal - filledCount} joueur${slotsTotal - filledCount > 1 ? "s" : ""}…`}
              </button>
            </>
          )}
          {!isHost && (
            <div style={{ ...card, textAlign: "center", padding: "20px 16px" }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>⏳</div>
              <p style={{ fontSize: 14, color: "var(--text2)", fontWeight: 600 }}>En attente de l'hôte…</p>
              <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 4 }}>L'hôte lancera la partie quand tout le monde sera là.</p>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ═══════════ SETUP ═══════════
  if (screen === "setup") return (
    <div style={cs}><style>{cssVars}</style>
      <button onClick={() => transition(() => setScreen("home"))} style={btnBack}>← Retour</button>
      <h2 style={sectionTitle}>Configuration</h2>
      <div style={card}>
        <label style={labelStyle}>Joueurs</label>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 8 }}>
          <button onClick={() => setPlayerCount(Math.max(3, playerCount - 1))} style={btnSmall}>−</button>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 28, fontWeight: 800, color: "var(--accent)", minWidth: 40, textAlign: "center" }}>{playerCount}</span>
          <button onClick={() => setPlayerCount(Math.min(20, playerCount + 1))} style={btnSmall}>+</button>
        </div>
      </div>
      <div style={card}>
        <label style={labelStyle}>Mode de jeu</label>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 8 }}>
          {MODES.map((m) => (
            <button key={m.id} onClick={() => setMode(m.id)} style={{ ...chipStyle, background: mode === m.id ? "var(--accent)" : "var(--surface2)", color: mode === m.id ? "#fff" : "var(--text2)", border: mode === m.id ? "2px solid var(--accent)" : "2px solid transparent" }}>
              <span style={{ fontSize: 18 }}>{m.icon}</span><span style={{ fontWeight: 700, fontSize: 13 }}>{m.label}</span><span style={{ fontSize: 10, opacity: .7 }}>{m.desc}</span>
            </button>
          ))}
        </div>
      </div>
      {mode === "perso" && (
        <div style={card}>
          <label style={labelStyle}>Rôles personnalisés</label>
          <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 4, marginBottom: 12 }}>
            {playerCount} joueurs → {Math.max(0, playerCount - customUC - customMW)} civil{Math.max(0, playerCount - customUC - customMW) > 1 ? "s" : ""}, {customUC} undercover{customUC > 1 ? "s" : ""}{customMW > 0 ? `, ${customMW} Mr White` : ""}
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 20 }}>🕵️</span>
                <span style={{ fontSize: 14, fontWeight: 600 }}>Undercover{customUC > 1 ? "s" : ""}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => setCustomUC(Math.max(1, customUC - 1))} style={btnSmall}>−</button>
                <span style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 800, color: "#E63946", minWidth: 24, textAlign: "center" }}>{customUC}</span>
                <button onClick={() => setCustomUC(Math.min(playerCount - 1 - customMW, customUC + 1))} style={btnSmall}>+</button>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 20 }}>👻</span>
                <span style={{ fontSize: 14, fontWeight: 600 }}>Mr White</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => setCustomMW(Math.max(0, customMW - 1))} style={btnSmall}>−</button>
                <span style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 800, color: "#888", minWidth: 24, textAlign: "center" }}>{customMW}</span>
                <button onClick={() => setCustomMW(Math.min(playerCount - 1 - customUC, customMW + 1))} style={btnSmall}>+</button>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", borderTop: "1px solid var(--border)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 20 }}>😊</span>
                <span style={{ fontSize: 14, fontWeight: 600 }}>Civil{Math.max(0, playerCount - customUC - customMW) > 1 ? "s" : ""}</span>
              </div>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 800, color: "var(--accent)" }}>
                {Math.max(0, playerCount - customUC - customMW)}
              </span>
            </div>
          </div>
          {(customUC + customMW >= playerCount) && (
            <p style={{ fontSize: 12, color: "#E63946", marginTop: 8, fontWeight: 600 }}>⚠️ Il faut au moins 1 civil !</p>
          )}
        </div>
      )}
      <div style={card}>
        <label style={labelStyle}>Thème</label>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginTop: 8 }}>
          {THEMES.map((t) => (
            <button key={t.id} onClick={() => setTheme(t.id)} style={{ ...chipStyleSmall, background: theme === t.id ? t.color + "22" : "var(--surface2)", border: theme === t.id ? `2px solid ${t.color}` : "2px solid transparent", color: theme === t.id ? t.color : "var(--text2)" }}>
              <span style={{ fontSize: 20 }}>{t.icon}</span><span style={{ fontSize: 10, fontWeight: 600 }}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
      {theme === "mix" && (
        <div style={card}><label style={labelStyle}>Mixer</label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 8 }}>
            {THEMES.filter((t) => t.id !== "mix").map((t) => (
              <button key={t.id} onClick={() => setMixThemes((p) => p.includes(t.id) ? p.filter((x) => x !== t.id) : [...p, t.id])} style={{ ...chipStyleSmall, background: mixThemes.includes(t.id) ? t.color + "22" : "var(--surface2)", border: mixThemes.includes(t.id) ? `2px solid ${t.color}` : "2px solid transparent", color: mixThemes.includes(t.id) ? t.color : "var(--text2)" }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
        </div>
      )}
      <div style={card}><label style={labelStyle}>Difficulté</label>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            {DIFFICULTIES.map((d) => (
              <button key={d.id} onClick={() => setDifficulty(d.id)} style={{ flex: 1, padding: "10px 8px", borderRadius: 12, cursor: "pointer", background: difficulty === d.id ? d.color + "22" : "var(--surface2)", border: difficulty === d.id ? `2px solid ${d.color}` : "2px solid transparent", color: difficulty === d.id ? d.color : "var(--text2)", fontWeight: 700, fontSize: 13, textAlign: "center", transition: "all .2s" }}>
                {d.label}
              </button>
            ))}
          </div>
        </div>
      <div style={card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <label style={labelStyle}>Timer</label>
          <button onClick={() => setTimerEnabled(!timerEnabled)} style={{ width: 48, height: 26, borderRadius: 13, border: "none", cursor: "pointer", background: timerEnabled ? "var(--accent)" : "var(--surface2)", position: "relative", transition: "background .3s" }}>
            <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: timerEnabled ? 25 : 3, transition: "left .3s" }} />
          </button>
        </div>
        {timerEnabled && (
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            {[30,45,60,90].map((s) => (
              <button key={s} onClick={() => setTimerSeconds(s)} style={{ flex: 1, padding: "8px 4px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontFamily: "var(--font-mono)", fontWeight: 700, background: timerSeconds === s ? "var(--accent)" : "var(--surface2)", color: timerSeconds === s ? "#fff" : "var(--text2)", border: "none", transition: "all .2s" }}>{s}s</button>
            ))}
          </div>
        )}
      </div>
      <div style={card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <label style={labelStyle}>Partie rapide</label>
            <p style={{ fontSize: 11, color: "var(--text3)", marginTop: 4, lineHeight: 1.4 }}>Pas de vote sur l'app — choisis directement la personne éliminée</p>
          </div>
          <button onClick={() => setQuickVote(!quickVote)} style={{ width: 48, height: 26, borderRadius: 13, border: "none", cursor: "pointer", background: quickVote ? "var(--accent)" : "var(--surface2)", position: "relative", transition: "background .3s", flexShrink: 0, marginLeft: 12 }}>
            <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: quickVote ? 25 : 3, transition: "left .3s" }} />
          </button>
        </div>
